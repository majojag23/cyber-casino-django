{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🎰 ROYAL CASINO CONNECT PRO - PREMIUM 🎰</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0518;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* 👑 ENCABEZADO CON BOTÓN FLOTANTE AL LOBBY */
        header {
            position: relative;
            background: linear-gradient(135deg, #1f1235, #0d0617);
            padding: 20px;
            border-bottom: 2px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
        }
        .btn-back {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff87;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0, 255, 135, 0.1);
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 135, 0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-back:hover {
            background: rgba(0, 255, 135, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 135, 0.2);
        }
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
            letter-spacing: 1px;
            display: inline-block;
        }

        /* 🎰 MÁQUINA TRAGAMONEDAS */
        .casino-container {
            max-width: 900px;
            margin: 25px auto;
            padding: 20px;
            background: #140b24;
            border: 3px solid #ffd700;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        .hud-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 5px 10px;
            border-bottom: 1px solid #3d2263;
        }
        .wallet-text { font-size: 18px; font-weight: bold; color: #00ff87; }
        .freespins-text { font-size: 18px; font-weight: bold; color: #ff007f; text-shadow: 0 0 8px rgba(255,0,127,0.4); }
        .bet-text { font-size: 18px; font-weight: bold; color: #ff9f43; }
        
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            background-color: #05020a;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #3d2263;
        }
        canvas { background-color: #000; border-radius: 4px; box-shadow: inset 0 0 20px #000; }

        /* CONTROLES Y DISPARADOR */
        .controls-row { display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 10px; }
        #status-message { font-size: 18px; font-weight: bold; min-height: 24px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .spin-button {
            background: linear-gradient(135deg, #00ff87, #00d1b2);
            border: none;
            color: #000;
            padding: 14px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .spin-button:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0, 255, 135, 0.6); }
        .spin-button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
        .spin-button.free-active {
            background: linear-gradient(135deg, #ff007f, #7928ca);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.5);
        }

        /* 💬 CHAT GLOBAL EN VIVO */
        .chat-container {
            max-width: 900px;
            margin: 20px auto;
            background-color: #140b24;
            border: 2px solid #3d2263;
            border-radius: 12px;
            padding: 15px;
        }
        .chat-log {
            height: 180px;
            overflow-y: auto;
            background-color: #05020a;
            border: 1px solid #3d2263;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            font-family: monospace;
            font-size: 14px;
        }
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input {
            flex-grow: 1;
            background-color: #1a0f30;
            border: 1px solid #5a3393;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }
        .chat-input:focus { outline: 2px solid #ffd700; }
        .chat-submit {
            background-color: #7928ca;
            border: none;
            color: #fff;
            padding: 0 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .chat-submit:hover { background-color: #ff007f; }
    </style>
</head>
<body>

    <header>
        <a href="{% url 'home' %}" class="btn-back">⬅ Volver al Lobby</a>
        <h1>🎰 MARIANA'S ROYAL CASINO & LIVE CHAT 🎰</h1>
    </header>

    <div class="casino-container">
        <div class="hud-bar">
            <div class="wallet-text" id="wallet-display">BILLETERA: Cargando...</div>
            <div class="freespins-text" id="freespins-display" style="display: none;">🎰 GIROS GRATIS: 0</div>
            <div class="bet-text" id="bet-display">APUESTA: $20</div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="slotCanvas" width="660" height="320"></canvas>
        </div>

        <div class="controls-row">
            <div id="status-message">SUERTE EN TU PRÓXIMO GIRO</div>
            <button class="spin-button" id="spinBtn" onclick="iniciarGiroWeb()">¡SPIN!</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-log" id="chat-log"></div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-message-input" type="text" placeholder="Escribe un mensaje en el chat global...">
            <button class="chat-submit" id="chat-message-submit">Enviar</button>
        </div>
    </div>

    <script>
        const sonidoGiro = new Audio("{% static 'sonidos/giro.mp3' %}");
        const sonidoPremio = new Audio("{% static 'sonidos/premio.mp3' %}");
        sonidoGiro.loop = true;
    </script>

    <script>
        const canvas = document.getElementById('slotCanvas');
        const ctx = canvas.getContext('2d');

        const nombresFrutas = ['cereza', 'limon', 'naranja', 'sandia', 'diamante', 'siete'];
        const imagenesFrutas = {};
        let imagenesCargadas = 0;

        nombresFrutas.forEach(fruta => {
            const img = new Image();
            img.src = `/static/imagenes/${fruta}.png`;
            img.onload = () => {
                imagenesCargadas++;
                if(imagenesCargadas === nombresFrutas.length) {
                    dibujarEstaticoInicial();
                }
            };
            imagenesFrutas[fruta] = img;
        });

        // Alineación física estricta
        let rodillos = [
            { y: 0, velocidad: 0, frutas: ['cereza', 'limon', 'naranja'] },
            { y: 0, velocidad: 0, frutas: ['sandia', 'diamante', 'siete'] },
            { y: 0, velocidad: 0, frutas: ['siete', 'cereza', 'limon'] }
        ];

        let estaGirandoWeb = false;
        let saldoActual = 0.00;
        let girosGratisRestantes = 0;

        let mostrarLineaNeon = false;
        let filaGanadora = 0; 
        let alfaNeon = 1.0;
        let variacionNeon = -0.05;

        // 🔐 Función para extraer el Token de Seguridad CSRF
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                saldoActual = parseFloat(data.creditos);
                document.getElementById('wallet-display').innerText = `BILLETERA: $${saldoActual.toFixed(2)}`;
            });

        function dibujarEstaticoInicial() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<3; i++) {
                let x = 30 + i * 210;
                ctx.fillStyle = '#110724';
                ctx.fillRect(x, 10, 180, 300);
                ctx.strokeStyle = '#4a2582';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, 10, 180, 300);

                ctx.save();
                ctx.beginPath();
                ctx.rect(x, 10, 180, 300);
                ctx.clip();
                for(let j=0; j<3; j++) {
                    let frutaNom = rodillos[i].frutas[j];
                    let img = imagenesFrutas[frutaNom];
                    if(img) ctx.drawImage(img, x + 40, 25 + j * 95, 100, 85);
                }
                ctx.restore();
            }
        }

        function loopAnimacion() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 3; i++) {
                let x = 30 + i * 210;
                ctx.fillStyle = '#110724';
                ctx.fillRect(x, 10, 180, 300);
                ctx.strokeStyle = '#4a2582';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, 10, 180, 300);

                let r = rodillos[i];
                if (r.velocidad > 0) {
                    r.y += r.velocidad;
                    if (r.y >= 95) r.y = 0;
                }

                ctx.save();
                ctx.beginPath();
                ctx.rect(x + 2, 12, 176, 296);
                ctx.clip();

                if (r.velocidad > 0) {
                    ctx.globalAlpha = 0.5;
                    for (let j = -1; j < 4; j++) {
                        let indice = (j + 2) % nombresFrutas.length;
                        let img = imagenesFrutas[nombresFrutas[indice]];
                        if(img) ctx.drawImage(img, x + 40, 25 + j * 95 + r.y, 100, 85);
                    }
                } else {
                    ctx.globalAlpha = 1.0;
                    for (let j = 0; j < 3; j++) {
                        let frutaNom = r.frutas[j];
                        let img = imagenesFrutas[frutaNom];
                        if(img) ctx.drawImage(img, x + 40, 25 + j * 95, 100, 85);
                    }
                }
                ctx.restore();
            }

            if (mostrarLineaNeon) {
                ctx.save();
                let alturasRealesY = [67, 162, 257]; 
                let alturaY = alturasRealesY[filaGanadora]; 

                alfaNeon += variacionNeon;
                if (alfaNeon <= 0.3 || alfaNeon >= 1.0) variacionNeon = -variacionNeon;

                ctx.strokeStyle = `rgba(0, 255, 135, ${alfaNeon})`;
                ctx.shadowColor = '#00ff87';
                ctx.shadowBlur = 20; 
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';

                ctx.beginPath();
                ctx.moveTo(40, alturaY);
                ctx.lineTo(620, alturaY);
                ctx.stroke();

                ctx.strokeStyle = `rgba(255, 0, 127, ${alfaNeon})`;
                ctx.shadowColor = '#ff007f';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 3;
                ctx.strokeRect(25, 10, 610, 300);
                ctx.restore();
            }

            requestAnimationFrame(loopAnimacion);
        }
        requestAnimationFrame(loopAnimacion);

        function iniciarGiroWeb() {
            if (estaGirandoWeb) return;
            
            let esGiroGratis = girosGratisRestantes > 0;
            if (!esGiroGratis && saldoActual < 20) {
                document.getElementById('status-message').innerText = "❌ SALDO INSUFICIENTE ❌";
                return;
            }

            estaGirandoWeb = true;
            document.getElementById('spinBtn').disabled = true;
            mostrarLineaNeon = false; 

            if (esGiroGratis) {
                girosGratisRestantes--;
                actualizarPanelGirosGratis();
                document.getElementById('status-message').innerText = `🎰 FREE SPIN EN CURSO (${girosGratisRestantes}) 🎰`;
                document.getElementById('status-message').style.color = "#ff007f";
            } else {
                document.getElementById('status-message').innerText = "🎰 GIRANDO EN VIVO... 🎰";
                document.getElementById('status-message').style.color = "#ff9f43";
            }

            try {
                sonidoPremio.pause(); sonidoPremio.currentTime = 0; 
                sonidoGiro.pause(); sonidoGiro.currentTime = 0; 
                sonidoGiro.volume = 1.0; sonidoGiro.play();
            } catch(e) {}

            rodillos[0].velocidad = 30;
            rodillos[1].velocidad = 30;
            rodillos[2].velocidad = 30;

            let costoApostar = esGiroGratis ? 0 : 20;

            // 🚀 MODIFICADO: Añadido el token CSRF para evitar bloqueos del servidor
            fetch('/api/apuesta/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ apuesta: costoApostar, ganancia: 0 }) 
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    liberarInterfazSlot();
                    return;
                }

                const bolsaFrutas = ['cereza','cereza','cereza','cereza','limon','limon','naranja','naranja','sandia','diamante','siete'];
                const obtenerFrutaAleatoria = () => bolsaFrutas[Math.floor(Math.random() * bolsaFrutas.length)];

                let finalFrutas = [
                    [obtenerFrutaAleatoria(), obtenerFrutaAleatoria(), obtenerFrutaAleatoria()],
                    [obtenerFrutaAleatoria(), obtenerFrutaAleatoria(), obtenerFrutaAleatoria()],
                    [obtenerFrutaAleatoria(), obtenerFrutaAleatoria(), obtenerFrutaAleatoria()]
                ];

                let controlBonus = Math.random();
                let activoFreeSpinsEnEsteGiro = false;
                if (controlBonus < 0.08) {
                    activoFreeSpinsEnEsteGiro = true;
                    girosGratisRestantes += 5;
                    finalFrutas = [
                        ['diamante', 'limon', 'cereza'],
                        ['naranja', 'diamante', 'siete'],
                        ['cereza', 'limon', 'diamante']
                    ];
                }

                setTimeout(() => { rodillos[0].velocidad = 0; rodillos[0].frutas = finalFrutas[0]; }, 500);
                setTimeout(() => { rodillos[1].velocidad = 0; rodillos[1].frutas = finalFrutas[1]; }, 950);
                
                setTimeout(() => { 
                    try {
                        rodillos[2].velocidad = 0; 
                        rodillos[2].frutas = finalFrutas[2];
                        
                        try { sonidoGiro.volume = 0.0; sonidoGiro.pause(); } catch(e){}

                        if (data && data.nuevo_saldo !== undefined) {
                            saldoActual = parseFloat(data.nuevo_saldo);
                        }
                        
                        let gananciaEstablecida = 0;

                        for (let j = 0; j < 3; j++) {
                            if (finalFrutas[0][j] === finalFrutas[1][j] && finalFrutas[1][j] === finalFrutas[2][j]) {
                                let frutaGanadoraNombre = finalFrutas[0][j];
                                filaGanadora = j; 
                                
                                if (frutaGanadoraNombre === 'siete') gananciaEstablecida = 200;
                                else if (frutaGanadoraNombre === 'diamante') gananciaEstablecida = 100;
                                else if (frutaGanadoraNombre === 'sandia') gananciaEstablecida = 50;
                                else if (frutaGanadoraNombre === 'naranja') gananciaEstablecida = 40;
                                else if (frutaGanadoraNombre === 'limon') gananciaEstablecida = 30;
                                else if (frutaGanadoraNombre === 'cereza') gananciaEstablecida = 25; 
                                break; 
                            }
                        }

                        if (gananciaEstablecida > 0) {
                            mostrarLineaNeon = true; 
                            alfaNeon = 1.0;
                            document.getElementById('status-message').innerText = `💥 ¡GANASTE +$${gananciaEstablecida}.00! 💥`;
                            document.getElementById('status-message').style.color = "#00ff87";
                            try { sonidoPremio.volume = 1.0; sonidoPremio.play(); } catch(e){}
                            
                            // 🚀 MODIFICADO: Añadido token CSRF en el reporte de la ganancia
                            fetch('/api/apuesta/', {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'X-CSRFToken': getCookie('csrftoken')
                                },
                                body: JSON.stringify({ apuesta: 0, ganancia: gananciaEstablecida })
                            })
                            .then(r => r.json())
                            .then(d => {
                                if (d && d.nuevo_saldo !== undefined) {
                                    saldoActual = parseFloat(d.nuevo_saldo);
                                }
                            })
                            .catch(e => console.error(e))
                            .finally(() => { liberarInterfazSlot(); });

                        } else {
                            if (activoFreeSpinsEnEsteGiro) {
                                mostrarLineaNeon = false; 
                                document.getElementById('status-message').innerText = "🎉 ¡BONUS! +5 GIROS GRATIS ACTIVADOS 🎉";
                                document.getElementById('status-message').style.color = "#ff007f";
                                try { sonidoPremio.volume = 1.0; sonidoPremio.play(); } catch(e){}
                            } else {
                                document.getElementById('status-message').innerText = esGiroGratis ? "GIRO COMPLETADO" : "SUERTE EN TU PRÓXIMO GIRO";
                                document.getElementById('status-message').style.color = "#aaa";
                            }
                            liberarInterfazSlot();
                        }
                    } catch (e) {
                        liberarInterfazSlot();
                    }
                }, 1400);
            })
            .catch(err => {
                if(!esGiroGratis && saldoActual >= 20) saldoActual -= 20;
                liberarInterfazSlot();
            });
        }

        function liberarInterfazSlot() {
            document.getElementById('wallet-display').innerText = `BILLETERA: $${saldoActual.toFixed(2)}`;
            actualizarPanelGirosGratis();
            estaGirandoWeb = false;
            document.getElementById('spinBtn').disabled = false;
        }

        function actualizarPanelGirosGratis() {
            const display = document.getElementById('freespins-display');
            const btn = document.getElementById('spinBtn');
            const betDisplay = document.getElementById('bet-display');

            if (girosGratisRestantes > 0) {
                display.style.display = "block";
                display.innerText = `🎰 GIROS GRATIS: ${girosGratisRestantes}`;
                btn.classList.add('free-active');
                btn.innerText = "¡FREE SPIN!";
                betDisplay.innerText = "APUESTA: FREE";
                betDisplay.style.color = "#ff007f";
            } else {
                display.style.display = "none";
                btn.classList.remove('free-active');
                btn.innerText = "¡SPIN!";
                betDisplay.innerText = "APUESTA: $20";
                betDisplay.style.color = "#ff9f43";
            }
        }
    </script>

    <script>
        let chatSocket;
        const chatLog = document.getElementById('chat-log');

        function conectarChat() {
            const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
            chatSocket = new WebSocket(`${wsScheme}://${window.location.host}/ws/chat/global/`);

            chatSocket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                if(data.usuario === 'Sistema') {
                    chatLog.innerHTML += `<div style="color: #ff007f; margin-bottom: 5px; background: rgba(255,0,127,0.05); padding: 4px; border-radius:4px;"><strong>${data.usuario}:</strong> ${data.mensaje}</div>`;
                } else {
                    chatLog.innerHTML += `<div style="margin-bottom: 5px; padding: 2px;"><strong style="color: #ffd700;">${data.usuario}:</strong> ${data.mensaje}</div>`;
                }
                chatLog.scrollTop = chatLog.scrollHeight; 
            };

            chatSocket.onclose = function(e) {
                setTimeout(conectarChat, 2000); 
            };
            chatSocket.onerror = function(err) {
                chatSocket.close();
            };
        }

        conectarChat();

        document.getElementById('chat-message-input').focus();
        document.getElementById('chat-message-input').onkeyup = function(e) {
            if (e.keyCode === 13) document.getElementById('chat-message-submit').click();
        };

        document.getElementById('chat-message-submit').onclick = function(e) {
            const mensajeInput = document.getElementById('chat-message-input');
            const mensaje = mensajeInput.value.trim();
            if(mensaje.length > 0 && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({ 'mensaje': mensaje }));
                mensajeInput.value = '';
            }
        };
    </script>
</body>
</html>
