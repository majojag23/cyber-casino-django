{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Royal Casino Core - Neon Slots</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #060211 url('{% static "imagenes/slots_bg.webp" %}') no-repeat center top/cover;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 110px;
        }

        /* --- HEADER --- */
        .game-header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }
        .btn-back {
            position: absolute; left: 15px;
            background: rgba(0, 191, 255, 0.15); border: 1px solid #00bfff;
            color: #00bfff; font-family: 'Orbitron', sans-serif; font-size: 11px;
            font-weight: 700; padding: 6px 12px; border-radius: 6px;
            text-decoration: none; z-index: 999;
        }
        .game-title {
            font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
            letter-spacing: 1px; text-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }
        .game-title span { color: #ec4899; }

        /* --- MARCADORES --- */
        .hud-container {
            width: 100%; max-width: 440px; margin: 0 auto; padding: 0 15px;
            display: flex; flex-direction: column; gap: 6px; position: relative; z-index: 30;
        }
        .jackpot-banner {
            background: rgba(10, 6, 26, 0.9); border: 2px solid #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); border-radius: 12px; padding: 6px;
            text-align: center; font-family: 'Orbitron', sans-serif;
        }
        .jackpot-title { font-size: 9px; color: #ff007f; font-weight: 900; letter-spacing: 1px; }
        .jackpot-amount { font-size: 18px; color: #fff; font-weight: 900; text-shadow: 0 0 8px #ff007f; }

        .scoreboard { display: flex; justify-content: space-between; width: 100%; }
        .hud-box {
            background: rgba(10, 6, 26, 0.9); border: 1px solid #a855f7;
            border-radius: 10px; padding: 6px 12px; width: 48%; font-family: 'Orbitron', sans-serif;
        }
        .hud-label { font-size: 9px; color: #94a3b8; font-weight: 700; }
        .hud-value { font-size: 13px; font-weight: 900; margin-top: 1px; }
        .val-wallet { color: #00ea97; }
        .val-bet { color: #eab308; }

        .freespins-badge {
            background: #00f0ff; color: #060211; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900;
            padding: 4px 12px; border-radius: 20px; text-align: center; margin: 2px auto; display: none; box-shadow: 0 0 10px #00f0ff;
        }

        /* --- ESCENARIO --- */
        .slots-stage {
            width: 100%; max-width: 420px; margin: 15px auto 0 auto; position: relative; 
            height: 290px; display: flex; align-items: flex-end; justify-content: center;
        }
        .bunny-layer {
            position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 175px; height: auto; z-index: 1; pointer-events: none;
            opacity: 0.85; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
        }
        .machine-frame {
            background: rgba(10, 6, 26, 0.96); border: 3px solid #bf5cf6;
            box-shadow: 0 0 20px rgba(191, 92, 246, 0.3); border-radius: 20px; padding: 8px;
            width: calc(100% - 24px); display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; position: relative; z-index: 10; height: 235px;
        }
        .reel-column {
            background: #04020a; border: 1px solid rgba(191, 92, 246, 0.2);
            border-radius: 12px; height: 100%; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
        }
        .symbol-slot { height: 68px; width: 68px; display: flex; align-items: center; justify-content: center; }
        .symbol-slot img { width: 52px; height: 52px; object-fit: contain; }

        /* --- ACCIÓN --- */
        .action-area {
            width: 100%; max-width: 440px; margin: 10px auto; padding: 0 15px; text-align: center; position: relative; z-index: 40;
        }
        .btn-spin {
            width: 100%; background: linear-gradient(180deg, #ec4899 0%, #a855f7 100%);
            border: 2px solid #fbcfe8; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            border-radius: 50px; padding: 14px; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
            color: #ffffff; cursor: pointer; letter-spacing: 1px;
        }
        .btn-spin:disabled { background: #374151; border-color: #4b5563; color: #9ca3af; box-shadow: none; }

        .win-flash { animation: neon-glow-win 0.3s ease-in-out infinite alternate !important; }
        @keyframes neon-glow-win {
            from { border-color: #bf5cf6; box-shadow: 0 0 15px #bf5cf6; }
            to { border-color: #00ea97; box-shadow: 0 0 30px #00ea97, inset 0 0 12px #00ea97; }
        }

        /* --- BOTTOM NAV DOCK --- */
        .bottom-navbar-dock {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 30px); max-width: 440px; z-index: 999;
        }
        .bottom-blur-capsule {
            background: rgba(15, 10, 36, 0.95); border: 1px solid rgba(168, 85, 247, 0.25);
            backdrop-filter: blur(10px); border-radius: 32px; height: 60px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-tab-link {
            text-align: center; color: #64748b; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .dock-tab-link.active { color: #ff007f; }
        .tab-icon-img { font-size: 16px; }
    </style>
</head>
<body>

    <input type="hidden" id="django-csrf" value="{{ csrf_token }}">

    <audio id="snd-spin" src='{% static "sonidos/giro.mp3" %}' preload="auto" loop></audio>
    <audio id="snd-win" src='{% static "sonidos/premio.mp3" %}' preload="auto"></audio>

    <header class="game-header">
        <a href="/lobby/" class="btn-back">❮ Volver</a>
        <h1 class="game-title">👑 NEON <span>SLOTS</span></h1>
    </header>

    <div class="hud-container">
        <div class="jackpot-banner">
            <p class="jackpot-title">⚡ SUPER JACKPOT ⚡</p>
            <p class="jackpot-amount">$<span id="lbl-jackpot">12,450.00</span></p>
        </div>

        <div class="scoreboard">
            <div class="hud-box">
                <p class="hud-label">💳 BILLETERA</p>
                <p class="hud-value val-wallet">$<span id="lbl-saldo">0.00</span></p>
            </div>
            <div class="hud-box">
                <p class="hud-label">🎰 APUESTA</p>
                <p class="hud-value val-bet">$<span id="lbl-apuesta">20.00</span></p>
            </div>
        </div>

        <div class="freespins-badge" id="badge-free">¡GIROS GRATIS ACTIVOS!</div>
    </div>

    <section class="slots-stage">
        <img class="bunny-layer" src='{% static "imagenes/bunny_mascot.webp" %}' alt="Mascota">
        
        <div class="machine-frame" id="slots-machine">
            <div class="reel-column" id="reel-1">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}'></div>
            </div>
            <div class="reel-column" id="reel-2">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_joya.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_7.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_watermelon.webp" %}'></div>
            </div>
            <div class="reel-column" id="reel-3">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}'></div>
            </div>
        </div>
    </section>

    <section class="action-area">
        <button class="btn-spin" id="btn-trigger" onclick="spinSlots()">SPIN NOW</button>
    </section>

    <div class="bottom-navbar-dock">
        <nav class="bottom-blur-capsule">
            <a href="/lobby/" class="dock-tab-link active"><span class="tab-icon-img">👑</span>LOBBY</a>
            <a href="/promos/" class="dock-tab-link"><span class="tab-icon-img">🎁</span>PROMOS</a>
            <a href="/vip/" class="dock-tab-link"><span class="tab-icon-img">💎</span>VIP</a>
            <a href="/perfil/" class="dock-tab-link"><span class="tab-icon-img">👤</span>PERFIL</a>
        </nav>
    </div>

    <script>
        const mappingAssets = {
            '7️⃣': '{% static "imagenes/sym_7.webp" %}', '7': '{% static "imagenes/sym_7.webp" %}', 'seven': '{% static "imagenes/sym_7.webp" %}',
            '🍒': '{% static "imagenes/sym_cherry.webp" %}', 'cherry': '{% static "imagenes/sym_cherry.webp" %}', 'cereza': '{% static "imagenes/sym_cherry.webp" %}',
            '🍋': '{% static "imagenes/sym_lemon.webp" %}', 'lemon': '{% static "imagenes/sym_lemon.webp" %}', 'limon': '{% static "imagenes/sym_lemon.webp" %}',
            '🍊': '{% static "imagenes/sym_orange.webp" %}', 'orange': '{% static "imagenes/sym_orange.webp" %}', 'naranja': '{% static "imagenes/sym_orange.webp" %}',
            '🍉': '{% static "imagenes/sym_watermelon.webp" %}', 'watermelon': '{% static "imagenes/sym_watermelon.webp" %}', 'sandia': '{% static "imagenes/sym_watermelon.webp" %}',
            '💎': '{% static "imagenes/sym_joya.webp" %}', 'diamond': '{% static "imagenes/sym_joya.webp" %}', 'diamante': '{% static "imagenes/sym_joya.webp" %}', 'diamond ': '{% static "imagenes/sym_joya.webp" %}', 'DIAMOND': '{% static "imagenes/sym_joya.webp" %}'
        };
        const assetKeys = ['7', 'cherry', 'lemon', 'orange', 'watermelon', 'diamond'];

        let saldoActual = 0;
        let freeSpinsRestantes = 0;
        
        // CORRECCIÓN: Los intervalos ahora son globales y accesibles desde cualquier lugar del script
        let intervalReel1 = null;
        let intervalReel2 = null;
        let intervalReel3 = null;

        function actualizarSaldoPantalla() {
            fetch('/api/saldo/')
                .then(res => res.json())
                .then(data => {
                    if(data && data.creditos !== undefined){
                        saldoActual = parseFloat(data.creditos);
                    } else if (data && data.saldo !== undefined) {
                        saldoActual = parseFloat(data.saldo);
                    }
                    document.getElementById('lbl-saldo').innerText = saldoActual.toFixed(2);
                }).catch(() => {
                    if(saldoActual === 0) { saldoActual = 500.00; }
                    document.getElementById('lbl-saldo').innerText = saldoActual.toFixed(2);
                });
        }
        actualizarSaldoPantalla();

        setInterval(() => {
            let jp = parseFloat(document.getElementById('lbl-jackpot').innerText.replace(/,/g, ''));
            jp += Math.random() * 0.12;
            document.getElementById('lbl-jackpot').innerText = jp.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }, 2500);

        function spinSlots() {
            const btn = document.getElementById('btn-trigger');
            const machine = document.getElementById('slots-machine');
            const csrfToken = document.getElementById('django-csrf').value;
            
            if (freeSpinsRestantes === 0) {
                if (saldoActual < 20) {
                    alert("Saldo insuficiente para jugar.");
                    return;
                }
                saldoActual -= 20;
                document.getElementById('lbl-saldo').innerText = saldoActual.toFixed(2);
            } else {
                freeSpinsRestantes--;
            }

            btn.disabled = true;
            machine.classList.remove('win-flash');

            const audioSpin = document.getElementById('snd-spin');
            audioSpin.currentTime = 0;
            audioSpin.play().catch(()=>{});

            // Iniciar animación rápida de rodillos usando las variables globales
            intervalReel1 = setInterval(() => {
                document.getElementById('reel-1').innerHTML = `
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                `;
            }, 70);

            intervalReel2 = setInterval(() => {
                document.getElementById('reel-2').innerHTML = `
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                `;
            }, 70);

            intervalReel3 = setInterval(() => {
                document.getElementById('reel-3').innerHTML = `
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                    <div class="symbol-slot"><img src="${mappingAssets[assetKeys[Math.floor(Math.random() * assetKeys.length)]]}"></div>
                `;
            }, 70);

            fetch('/api/apuesta/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ juego: 'slots', monto: 20 })
            })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => {
                    clearInterval(intervalReel1);
                    renderReel(1, data.resultado_visual[0]);
                    
                    setTimeout(() => {
                        clearInterval(intervalReel2);
                        renderReel(2, data.resultado_visual[1]);
                        
                        setTimeout(() => {
                            clearInterval(intervalReel3);
                            renderReel(3, data.resultado_visual[2]);
                            
                            finalizarTiro(data.ganado, data.nuevo_saldo || data.saldo, data.free_spins_restantes);
                        }, 250);
                    }, 250);
                }, 1100);
            })
            .catch(() => {
                // CORRECCIÓN TOTAL CATCH: Se limpian de forma segura los rodillos globales pase lo que pase
                setTimeout(() => {
                    clearInterval(intervalReel1);
                    const res1 = [assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)]];
                    renderReel(1, res1);
                    
                    setTimeout(() => {
                        clearInterval(intervalReel2);
                        const res2 = [assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)]];
                        renderReel(2, res2);
                        
                        setTimeout(() => {
                            clearInterval(intervalReel3);
                            const res3 = [assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)], assetKeys[Math.floor(Math.random() * assetKeys.length)]];
                            renderReel(3, res3);
                            
                            let premioSimulado = 0;
                            if (res1[1] === res2[1] && res2[1] === res3[1]) {
                                premioSimulado = 100;
                                saldoActual += premioSimulado;
                            }
                            finalizarTiro(premioSimulado, saldoActual, freeSpinsRestantes);
                        }, 250);
                    }, 250);
                }, 1100);
            });
        }

        function finalizarTiro(ganado, nuevoSaldo, spinsRestantes) {
            const btn = document.getElementById('btn-trigger');
            const machine = document.getElementById('slots-machine');
            const audioSpin = document.getElementById('snd-spin');

            audioSpin.pause();
            audioSpin.currentTime = 0;

            saldoActual = parseFloat(nuevoSaldo);
            document.getElementById('lbl-saldo').innerText = saldoActual.toFixed(2);

            if (ganado && ganado > 0) {
                machine.classList.add('win-flash');
                const audioWin = document.getElementById('snd-win');
                audioWin.currentTime = 0;
                audioWin.play().catch(()=>{});
            }

            freeSpinsRestantes = spinsRestantes || 0;
            const freeBadge = document.getElementById('badge-free');
            if(freeSpinsRestantes > 0) {
                freeBadge.innerText = `¡GIROS GRATIS RESTANTES: ${freeSpinsRestantes}!`;
                freeBadge.style.display = "block";
            } else {
                freeBadge.style.display = "none";
            }

            btn.disabled = false;
        }

        function renderReel(reelNum, arr) {
            const reel = document.getElementById(`reel-${reelNum}`);
            reel.innerHTML = arr.map(sym => {
                let cleanKey = String(sym).toLowerCase().trim();
                let srcImg = mappingAssets[cleanKey] || mappingAssets['cherry'];
                return `<div class="symbol-slot"><img src="${srcImg}"></div>`;
            }).join('');
        }
    </script>
</body>
</html>
