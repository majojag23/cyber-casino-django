{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Royal Casino Core - Neon Slots</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #060211 url('{% static "imagenes/slots_bg.webp" %}') no-repeat center top/cover;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 90px;
        }

        /* --- ENCABEZADO --- */
        .game-header {
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 60px;
        }
        .btn-back {
            position: absolute; left: 15px; top: 15px;
            background: rgba(0, 191, 255, 0.15); border: 1px solid #00bfff;
            color: #00bfff; font-family: 'Orbitron', sans-serif; font-size: 11px;
            font-weight: 700; padding: 6px 12px; border-radius: 6px;
            text-decoration: none; display: flex; align-items: center; gap: 4px;
        }
        .game-title {
            font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
            text-align: center; letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }
        .game-title span { color: #ec4899; }

        /* --- MARCADORES --- */
        .scoreboard {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 440px; margin: 5px auto; padding: 0 16px;
            z-index: 10;
        }
        .hud-box {
            background: rgba(13, 10, 31, 0.85);
            border: 1px solid #a855f7; box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.3);
            border-radius: 10px; padding: 6px 12px; width: 46%;
            font-family: 'Orbitron', sans-serif;
        }
        .hud-label { font-size: 9px; color: #94a3b8; font-weight: 700; }
        .hud-value { font-size: 14px; font-weight: 900; margin-top: 1px; }
        .val-wallet { color: #00ea97; }
        .val-bet { color: #eab308; }

        /* --- CONTENEDOR DE LA MÁQUINA (CAPAS PERFECTAS FIGMA) --- */
        .slots-stage {
            width: 100%; max-width: 420px; margin: 0 auto;
            position: relative; 
            height: 380px; /* Altura controlada para las capas */
            display: flex;
            align-items: flex-end; /* Fuerza al marco a estar abajo */
            justify-content: center;
        }

        /* Mascota Conejita: Posicionada detrás del marco */
        .bunny-layer {
            position: absolute;
            bottom: 40px; /* Empujada hacia abajo */
            left: 50%;
            transform: translateX(-50%);
            width: 210px; 
            height: auto; 
            z-index: 1; /* DETRÁS del marco */
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.6));
        }

        /* Marco de los rodillos: Se sobrepone tapando las piernas de la conejita */
        .machine-frame {
            background: rgba(10, 6, 26, 0.95);
            border: 3px solid #bf5cf6;
            box-shadow: 0 0 25px rgba(191, 92, 246, 0.5), inset 0 0 15px rgba(0,0,0,0.8);
            border-radius: 20px; 
            padding: 8px;
            width: calc(100% - 24px); 
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 6px; 
            position: relative; 
            z-index: 5; /* ENCIMA de la conejita */
            height: 245px; /* Altura reducida para eliminar espacios negros gigantes */
        }

        /* Rodillos estilizados */
        .reel-column {
            background: #04020a; 
            border: 1px solid rgba(191, 92, 246, 0.3);
            border-radius: 12px; 
            height: 100%; 
            overflow: hidden;
            position: relative; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around;
            align-items: center;
        }
        
        .symbol-slot {
            height: 70px; 
            width: 70px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: transform 0.1s linear;
        }
        .symbol-slot img {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        /* --- BOTÓN SPIN NOW --- */
        .action-area {
            width: 100%; max-width: 440px; margin: 15px auto 5px auto;
            padding: 0 16px; text-align: center; position: relative;
            z-index: 10;
        }
        .btn-spin {
            width: 100%;
            background: linear-gradient(180deg, #ec4899 0%, #a855f7 100%);
            border: 2px solid #fbcfe8; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            border-radius: 50px; padding: 14px;
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
            color: #ffffff; cursor: pointer; letter-spacing: 1px;
            transition: transform 0.1s;
        }
        .btn-spin:active { transform: scale(0.97); }
        .btn-spin:disabled { background: #374151; border-color: #4b5563; color: #9ca3af; box-shadow: none; }

        .decor-chips {
            position: absolute; right: 10px; bottom: -12px;
            width: 65px; height: auto; pointer-events: none; z-index: 12;
        }

        /* Efecto destello ganador neón */
        .win-flash {
            animation: glow-pulse 0.4s ease-in-out infinite alternate;
        }
        @keyframes glow-pulse {
            from { box-shadow: 0 0 5px #00ea97, inset 0 0 5px #00ea97; }
            to { box-shadow: 0 0 20px #00ea97, inset 0 0 10px #00ea97; border-color: #00ea97; }
        }

        /* --- NAVBAR INFERIOR --- */
        .bottom-navbar-dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 30px); max-width: 440px; z-index: 100;
        }
        .bottom-blur-capsule {
            background: rgba(15, 10, 36, 0.9); border: 1px solid rgba(168, 85, 247, 0.35);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 32px; height: 64px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-tab-link {
            text-align: center; color: #64748b; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .dock-tab-link.active { color: #ff007f; }
        .tab-icon-img { font-size: 18px; }
    </style>
</head>
<body>

    <header class="game-header">
        <a href="/lobby/" class="btn-back">❮ Volver</a>
        <h1 class="game-title">👑 NEON <span>SLOTS</span></h1>
    </header>

    <section class="scoreboard">
        <div class="hud-box">
            <p class="hud-label">💳 BILLETERA</p>
            <p class="hud-value val-wallet">$<span id="lbl-saldo">50.00</span></p>
        </div>
        <div class="hud-box">
            <p class="hud-label">🎰 APUESTA</p>
            <p class="hud-value val-bet">$<span id="lbl-apuesta">20.00</span></p>
        </div>
    </section>

    <section class="slots-stage">
        <img class="bunny-layer" src='{% static "imagenes/bunny_mascot.webp" %}' alt="Mascota">
        
        <div class="machine-frame" id="slots-machine">
            <div class="reel-column" id="reel-1">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}' alt="cherry"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}' alt="orange"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}' alt="lemon"></div>
            </div>
            <div class="reel-column" id="reel-2">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_diamond.webp" %}' alt="diamond"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_7.webp" %}' alt="seven"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_watermelon.webp" %}' alt="watermelon"></div>
            </div>
            <div class="reel-column" id="reel-3">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}' alt="lemon"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}' alt="orange"></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}' alt="cherry"></div>
            </div>
        </div>
    </section>

    <section class="action-area">
        <button class="btn-spin" id="btn-trigger" onclick="spinSlots()">SPIN NOW</button>
        <img class="decor-chips" src='{% static "imagenes/casino_chips.webp" %}' alt="Chips">
    </section>

    <div class="bottom-navbar-dock">
        <nav class="bottom-blur-capsule">
            <a href="/lobby/" class="dock-tab-link active"><span class="tab-icon-img">👑</span>LOBBY</a>
            <a href="/promos/" class="dock-tab-link"><span class="tab-icon-img">🎁</span>PROMOS</a>
            <a href="/vip/" class="dock-tab-link"><span class="tab-icon-img">💎</span>VIP</a>
            <a href="/perfil/" class="dock-tab-link"><span class="tab-icon-img">👤</span>PERFIL</a>
        </nav>
    </div>

    <script>
        const mappingAssets = {
            '7️⃣': '{% static "imagenes/sym_7.webp" %}',
            '🍒': '{% static "imagenes/sym_cherry.webp" %}',
            '🍋': '{% static "imagenes/sym_lemon.webp" %}',
            '🍊': '{% static "imagenes/sym_orange.webp" %}',
            '🍉': '{% static "imagenes/sym_watermelon.webp" %}',
            '💎': '{% static "imagenes/sym_diamond.webp" %}'
        };
        const keysArr = Object.keys(mappingAssets);

        function spinSlots() {
            const btn = document.getElementById('btn-trigger');
            const machine = document.getElementById('slots-machine');
            btn.disabled = true;
            machine.classList.remove('win-flash');

            // 1. Animación de rodillos simulando el giro a alta velocidad
            let intervals = [];
            for (let i = 1; i <= 3; i++) {
                let reel = document.getElementById(`reel-${i}`);
                intervals[i] = setInterval(() => {
                    reel.innerHTML = `
                        <div class="symbol-slot"><img src="${mappingAssets[keysArr[Math.floor(Math.random() * keysArr.length)]]}"></div>
                        <div class="symbol-slot"><img src="${mappingAssets[keysArr[Math.floor(Math.random() * keysArr.length)]]}"></div>
                        <div class="symbol-slot"><img src="${mappingAssets[keysArr[Math.floor(Math.random() * keysArr.length)]]}"></div>
                    `;
                }, 75);
            }

            // 2. Conexión AJAX con el backend real de Django para procesar el giro
            fetch('/api/apuesta/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ juego: 'slots', monto: 20 })
            })
            .then(res => res.json())
            .then(data => {
                // Detener los rodillos uno por uno de forma progresiva
                setTimeout(() => {
                    clearInterval(intervals[1]);
                    // Colocar resultado del rodillo 1 que mandó el servidor
                    renderReel(1, data.resultado_visual[0]);
                    
                    setTimeout(() => {
                        clearInterval(intervals[2]);
                        renderReel(2, data.resultado_visual[1]);
                        
                        setTimeout(() => {
                            clearInterval(intervals[3]);
                            renderReel(3, data.resultado_visual[2]);
                            
                            // Efecto neón ganador si hubo premio
                            if (data.ganado > 0) {
                                machine.classList.add('win-flash');
                            }
                            
                            document.getElementById('lbl-saldo').innerText = data.nuevo_saldo.toFixed(2);
                            btn.disabled = false;
                        }, 250);
                    }, 250);
                }, 1200);
            })
            .catch(err => {
                // Parar todo en caso de error
                for(let k=1; k<=3; k++) clearInterval(intervals[k]);
                btn.disabled = false;
                alert("Ocurrió un error al procesar el tiro.");
            });
        }

        function renderReel(reelNum, simbolosArray) {
            const reel = document.getElementById(`reel-${reelNum}`);
            reel.innerHTML = simbolosArray.map(sym => `
                <div class="symbol-slot"><img src="${mappingAssets[sym] || mappingAssets['🍒']}"></div>
            `).join('');
        }

        // Cargar saldo real de billetera al iniciar
        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                if(data && data.creditos !== undefined){
                    document.getElementById('lbl-saldo').innerText = data.creditos.toFixed(2);
                }
            });
    </script>
</body>
</html>
