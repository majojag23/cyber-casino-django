{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Royal Casino Core - Neon Slots</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #060211 url('{% static "imagenes/slots_bg.webp" %}') no-repeat center top/cover;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 120px; /* Espacio extra para que no tape el botón spin */
        }

        /* --- HEADER Y VOLVER --- */
        .game-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }
        .btn-back {
            position: absolute; left: 15px;
            background: rgba(0, 191, 255, 0.15); border: 1px solid #00bfff;
            color: #00bfff; font-family: 'Orbitron', sans-serif; font-size: 11px;
            font-weight: 700; padding: 6px 12px; border-radius: 6px;
            text-decoration: none;
        }
        .game-title {
            font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
            letter-spacing: 1px; text-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }
        .game-title span { color: #ec4899; }

        /* --- JACKPOT DISPLAY --- */
        .jackpot-banner {
            background: rgba(255, 0, 127, 0.1);
            border: 2px solid #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            border-radius: 12px;
            width: calc(100% - 30px); max-width: 440px;
            margin: 5px auto; padding: 8px;
            text-align: center; font-family: 'Orbitron', sans-serif;
        }
        .jackpot-title { font-size: 10px; color: #ff007f; font-weight: 900; letter-spacing: 2px; }
        .jackpot-amount { font-size: 20px; color: #fff; font-weight: 900; text-shadow: 0 0 8px #ff007f; }

        /* --- MARCADORES --- */
        .scoreboard {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 440px; margin: 5px auto; padding: 0 15px;
        }
        .hud-box {
            background: rgba(13, 10, 31, 0.85); border: 1px solid #a855f7;
            border-radius: 10px; padding: 6px 12px; width: 48%;
            font-family: 'Orbitron', sans-serif;
        }
        .hud-label { font-size: 9px; color: #94a3b8; font-weight: 700; }
        .hud-value { font-size: 14px; font-weight: 900; margin-top: 1px; }
        .val-wallet { color: #00ea97; }
        .val-bet { color: #eab308; }

        /* --- FREE SPINS COUNTER --- */
        .freespins-badge {
            background: #00f0ff; color: #060211;
            font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 900;
            padding: 4px 12px; border-radius: 20px; margin: 4px auto;
            display: none; box-shadow: 0 0 10px #00f0ff;
        }

        /* --- AREA DE LA MAQUINA (CALIBRADO) --- */
        .slots-stage {
            width: 100%; max-width: 420px; margin: 10px auto 0 auto;
            position: relative; height: 350px;
            display: flex; align-items: flex-end; justify-content: center;
        }

        .bunny-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 220px; height: auto; z-index: 1;
        }

        .machine-frame {
            background: rgba(10, 6, 26, 0.95);
            border: 3px solid #bf5cf6;
            box-shadow: 0 0 25px rgba(191, 92, 246, 0.4);
            border-radius: 20px; padding: 8px;
            width: calc(100% - 24px); display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; position: relative; z-index: 5; height: 245px;
        }

        .reel-column {
            background: #04020a; border: 1px solid rgba(191, 92, 246, 0.25);
            border-radius: 12px; height: 100%; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
        }
        
        .symbol-slot {
            height: 70px; width: 70px; display: flex; align-items: center; justify-content: center;
        }
        .symbol-slot img { width: 54px; height: 54px; object-fit: contain; }

        /* --- ACCIONES Y SPIN --- */
        .action-area {
            width: 100%; max-width: 440px; margin: 15px auto;
            padding: 0 15px; text-align: center; position: relative; z-index: 10;
        }
        .btn-spin {
            width: 100%;
            background: linear-gradient(180deg, #ec4899 0%, #a855f7 100%);
            border: 2px solid #fbcfe8; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            border-radius: 50px; padding: 15px;
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900;
            color: #ffffff; cursor: pointer; letter-spacing: 1px;
        }
        .btn-spin:disabled { background: #374151; border-color: #4b5563; color: #9ca3af; box-shadow: none; }

        /* BARRA NEON DE VICTORIA (WIN FLASH) */
        .win-flash { animation: neon-glow 0.3s ease-in-out infinite alternate; }
        @keyframes neon-glow {
            from { border-color: #bf5cf6; box-shadow: 0 0 15px rgba(191, 92, 246, 0.4); }
            to { border-color: #00ea97; box-shadow: 0 0 30px #00ea97, inset 0 0 10px #00ea97; }
        }

        /* --- MENU DOCK INFERIOR --- */
        .bottom-navbar-dock {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 30px); max-width: 440px; z-index: 100;
        }
        .bottom-blur-capsule {
            background: rgba(15, 10, 36, 0.92); border: 1px solid rgba(168, 85, 247, 0.3);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 32px; height: 62px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-tab-link {
            text-align: center; color: #64748b; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .dock-tab-link.active { color: #ff007f; }
        .tab-icon-img { font-size: 16px; }
    </style>
</head>
<body>

    <!-- Audios del juego -->
    <audio id="snd-spin" src='{% static "sonidos/spin.mp3" %}' prelaod="auto"></audio>
    <audio id="snd-win" src='{% static "sonidos/win.mp3" %}' preload="auto"></audio>
    <audio id="snd-jackpot" src='{% static "sonidos/jackpot.mp3" %}' preload="auto"></audio>

    <header class="game-header">
        <a href="/lobby/" class="btn-back">❮ Volver</a>
        <h1 class="game-title">👑 NEON <span>SLOTS</span></h1>
    </header>

    <!-- Super Jackpot Real -->
    <div class="jackpot-banner">
        <p class="jackpot-title">⚡ SUPER JACKPOT ⚡</p>
        <p class="jackpot-amount">$<span id="lbl-jackpot">12,450.00</span></p>
    </div>

    <section class="scoreboard">
        <div class="hud-box">
            <p class="hud-label">💳 BILLETERA</p>
            <p class="hud-value val-wallet">$<span id="lbl-saldo">0.00</span></p>
        </div>
        <div class="hud-box">
            <p class="hud-label">🎰 APUESTA</p>
            <p class="hud-value val-bet">$<span id="lbl-apuesta">20.00</span></p>
        </div>
    </section>

    <!-- Giro Gratis Notificación -->
    <div class="freespins-badge" id="badge-free">¡GIRO GRATIS ACTIVO!</div>

    <section class="slots-stage">
        <img class="bunny-layer" src='{% static "imagenes/bunny_mascot.webp" %}' alt="Mascota">
        
        <div class="machine-frame" id="slots-machine">
            <!-- Rodillos iniciales con imágenes seguras de Figma -->
            <div class="reel-column" id="reel-1">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}'></div>
            </div>
            <div class="reel-column" id="reel-2">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_diamond.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_7.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_watermelon.webp" %}'></div>
            </div>
            <div class="reel-column" id="reel-3">
                <div class="symbol-slot"><img src='{% static "imagenes/sym_lemon.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_orange.webp" %}'></div>
                <div class="symbol-slot"><img src='{% static "imagenes/sym_cherry.webp" %}'></div>
            </div>
        </div>
    </section>

    <section class="action-area">
        <button class="btn-spin" id="btn-trigger" onclick="spinSlots()">SPIN NOW</button>
    </section>

    <div class="bottom-navbar-dock">
        <nav class="bottom-blur-capsule">
            <a href="/lobby/" class="dock-tab-link active"><span class="tab-icon-img">👑</span>LOBBY</a>
            <a href="/promos/" class="dock-tab-link"><span class="tab-icon-img">🎁</span>PROMOS</a>
            <a href="/vip/" class="dock-tab-link"><span class="tab-icon-img">💎</span>VIP</a>
            <a href="/perfil/" class="dock-tab-link"><span class="tab-icon-img">👤</span>PERFIL</a>
        </nav>
    </div>

    <script>
        // SOPORTE MULTIFORMATO: Vincula emojis y textos planos que mande tu backend con los assets de Figma
        const mappingAssets = {
            '7️⃣': '{% static "imagenes/sym_7.webp" %}', '7': '{% static "imagenes/sym_7.webp" %}', 'seven': '{% static "imagenes/sym_7.webp" %}',
            '🍒': '{% static "imagenes/sym_cherry.webp" %}', 'cherry': '{% static "imagenes/sym_cherry.webp" %}', 'cereza': '{% static "imagenes/sym_cherry.webp" %}',
            '🍋': '{% static "imagenes/sym_lemon.webp" %}', 'lemon': '{% static "imagenes/sym_lemon.webp" %}', 'limon': '{% static "imagenes/sym_lemon.webp" %}',
            '🍊': '{% static "imagenes/sym_orange.webp" %}', 'orange': '{% static "imagenes/sym_orange.webp" %}', 'naranja': '{% static "imagenes/sym_orange.webp" %}',
            '🍉': '{% static "imagenes/sym_watermelon.webp" %}', 'watermelon': '{% static "imagenes/sym_watermelon.webp" %}', 'sandia': '{% static "imagenes/sym_watermelon.webp" %}',
            '💎': '{% static "imagenes/sym_diamond.webp" %}', 'diamond': '{% static "imagenes/sym_diamond.webp" %}', 'diamante': '{% static "imagenes/sym_diamond.webp" %}'
        };
        const fallbacks = Object.keys(mappingAssets);

        // Efecto visual dinámico para incrementar el Jackpot progresivamente
        setInterval(() => {
            let jp = parseFloat(document.getElementById('lbl-jackpot').innerText.replace(/,/g, ''));
            jp += Math.random() * 0.15;
            document.getElementById('lbl-jackpot').innerText = jp.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }, 3000);

        function spinSlots() {
            const btn = document.getElementById('btn-trigger');
            const machine = document.getElementById('slots-machine');
            
            // Sonidos e inicialización
            document.getElementById('snd-spin').play().catch(()=>{});
            btn.disabled = true;
            machine.classList.remove('win-flash');

            // Animación cíclica veloz de rodillos
            let intervals = [];
            for (let i = 1; i <= 3; i++) {
                let reel = document.getElementById(`reel-${i}`);
                intervals[i] = setInterval(() => {
                    reel.innerHTML = `
                        <div class="symbol-slot"><img src="${mappingAssets[fallbacks[Math.floor(Math.random() * fallbacks.length)]]}"></div>
                        <div class="symbol-slot"><img src="${mappingAssets[fallbacks[Math.floor(Math.random() * fallbacks.length)]]}"></div>
                        <div class="symbol-slot"><img src="${mappingAssets[fallbacks[Math.floor(Math.random() * fallbacks.length)]]}"></div>
                    `;
                }, 70);
            }

            // Petición al backend original
            fetch('/api/apuesta/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ juego: 'slots', monto: 20 })
            })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => {
                    clearInterval(intervals[1]);
                    renderReel(1, data.resultado_visual ? data.resultado_visual[0] : ['lemon','cherry','orange']);
                    
                    setTimeout(() => {
                        clearInterval(intervals[2]);
                        renderReel(2, data.resultado_visual ? data.resultado_visual[1] : ['7','diamond','watermelon']);
                        
                        setTimeout(() => {
                            clearInterval(intervals[3]);
                            renderReel(3, data.resultado_visual ? data.resultado_visual[2] : ['cherry','orange','lemon']);
                            
                            // Manejo de recompensas y barra de neón
                            if (data.ganado > 0) {
                                machine.classList.add('win-flash');
                                if(data.es_super_jackpot) {
                                    document.getElementById('snd-jackpot').play().catch(()=>{});
                                } else {
                                    document.getElementById('snd-win').play().catch(()=>{});
                                }
                            }

                            // Soporte para Free Spins (Giros Gratis)
                            const freeBadge = document.getElementById('badge-free');
                            if(data.free_spins_restantes && data.free_spins_restantes > 0) {
                                freeBadge.innerText = `¡GIROS GRATIS RESTANTES: ${data.free_spins_restantes}!`;
                                freeBadge.style.display = "block";
                            } else {
                                freeBadge.style.display = "none";
                            }
                            
                            document.getElementById('lbl-saldo').innerText = data.nuevo_saldo.toFixed(2);
                            btn.disabled = false;
                        }, 250);
                    }, 250);
                }, 1000);
            })
            .catch(() => {
                for(let k=1; k<=3; k++) clearInterval(intervals[k]);
                btn.disabled = false;
            });
        }

        function renderReel(reelNum, arr) {
            const reel = document.getElementById(`reel-${reelNum}`);
            // Normalizar a minúsculas para asegurar empate con el mapeo de imágenes
            reel.innerHTML = arr.map(sym => {
                let cleanKey = String(sym).toLowerCase().trim();
                let srcImg = mappingAssets[cleanKey] || mappingAssets['cherry'];
                return `<div class="symbol-slot"><img src="${srcImg}"></div>`;
            }).join('');
        }

        // Recuperación inicial de billetera real
        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                if(data && data.creditos !== undefined){
                    document.getElementById('lbl-saldo').innerText = data.creditos.toFixed(2);
                }
            });
    </script>
</body>
</html>
