{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🐼 PANDA CYBER-MINES // PREMIUM INTERFACE 🐼</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-image: url("/static/imagenes/fondo_cyber.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #00ff87;
            overflow-x: hidden;
        }
        
        header {
            position: relative;
            background: linear-gradient(135deg, #1f1235, #0d0617);
            padding: 20px;
            border-bottom: 2px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-align: center;
        }
        .btn-lobby {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff87;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0, 255, 135, 0.1);
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 135, 0.3);
            transition: all 0.2s;
        }
        .btn-lobby:hover {
            background: rgba(0, 255, 135, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 135, 0.2);
        }
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
            letter-spacing: 1px;
            display: inline-block;
        }

        .game-wrapper {
            display: flex;
            flex-wrap: wrap;
            max-width: 950px;
            width: 95%;
            margin: 35px auto;
            gap: 25px;
        }
        
        /* 🛠️ AJUSTE DETALLADO AL PANEL DE CONTROL (Más compacto y arriba) */
        .panel-control {
            flex: 1;
            min-width: 290px;
            background: #140b24;
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 18px; /* Reducido de 25px */
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reducido de 20px */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .panel-tablero {
            flex: 1.6;
            min-width: 340px;
            background: #140b24;
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .label-tech {
            font-size: 13px;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px; /* Reducido de 8px */
            display: block;
            font-weight: bold;
        }
        .input-tech {
            width: 100%;
            background: #05020a;
            border: 1px solid #3d2263;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
            outline: none;
        }
        .input-tech:focus { border-color: #ffd700; }
        
        .minas-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .btn-mina-opcion {
            background: #05020a;
            border: 1px solid #3d2263;
            color: #aaa;
            padding: 12px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-mina-opcion.active {
            border-color: #ff0055;
            color: #fff;
            background: linear-gradient(135deg, #ff0055, #7928ca);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }
        
        .hud-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3d2263;
        }
        .wallet-text { font-size: 18px; font-weight: bold; color: #00ff87; }
        .mult-text { font-size: 18px; font-weight: bold; color: #ff9f43; }

        .grid-buscaminas {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background-color: #05020a;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #3d2263;
            margin-bottom: 20px;
        }
        
        .celda {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1b0f3a, #0a0518);
            border: 2px solid #3d2263;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            position: relative;
        }
        .celda::before {
            content: "🔒";
            font-size: 18px;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .celda:hover:not(.revelada):not(:disabled) {
            border-color: #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }
        .celda:hover::before { opacity: 0.8; }
        
        .celda.revelada, .celda.bomba-explotada {
            background: #0d071a;
            border-color: #3d2263;
            cursor: default;
            transform: none;
            box-shadow: none;
        }
        .celda.revelada::before, .celda.bomba-explotada::before { display: none; }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #00ff87, #00d1b2);
            color: #030611;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
            transition: all 0.2s;
            margin-top: 10px; /* Cambiado de margin-top: auto para evitar desfases */
        }
        .btn-action:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0, 255, 135, 0.5); }
        .btn-cashout {
            background: linear-gradient(135deg, #ff0055, #7928ca);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
        }
        .btn-cashout:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(255, 0, 85, 0.6); }
        
        #status-message {
            font-size: 15px;
            color: #aaa;
            min-height: 40px;
            margin-top: 10px;
            line-height: 1.4;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .img-asset {
            width: 80%;
            height: 80%;
            object-fit: contain;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <a href="{% url 'home' %}" class="btn-lobby">⬅ Volver al Lobby</a>
        <h1>🎰 MARIANA'S ROYAL CASINO // PANDA CYBER-MINES 🎰</h1>
    </header>

    <div class="game-wrapper">
        
        <div class="panel-control">
            <div>
                <label class="label-tech">Monto a Apostar ($ Min: 10)</label>
                <input type="number" id="apuestaInput" class="input-tech" value="10" min="10" step="5">
            </div>

            <div>
                <label class="label-tech">Cantidad de Minas</label>
                <div class="minas-selector">
                    <button class="btn-mina-opcion active" onclick="cambiarCantidadMinas(1, this)">1</button>
                    <button class="btn-mina-opcion" onclick="cambiarCantidadMinas(3, this)">3</button>
                    <button class="btn-mina-opcion" onclick="cambiarCantidadMinas(5, this)">5</button>
                    <button class="btn-mina-opcion" onclick="cambiarCantidadMinas(10, this)">10</button>
                </div>
            </div>

            <div>
                <button id="btnPrincipal" class="btn-action" onclick="manejarFlujoBuscaminas()">Inicializar Hackeo</button>
            </div>
        </div>

        <div class="panel-tablero">
            <div class="hud-bar">
                <div class="wallet-text" id="wallet-display">BILLETERA: Cargando...</div>
                <div class="mult-text" id="mult-display">MULT: 1.00x</div>
            </div>

            <div class="grid-buscaminas" id="tableroMines"></div>
            
            <div id="status-message">AJUSTA LOS PARÁMETROS TÁCTICOS E INICIA EL JUEGO BLINDADO.</div>
        </div>

    </div>

    <script>
        let saldoActual = 0.00;
        let estaJugando = false;
        let minasConfiguradas = 1;
        let aciertosActuales = 0;
        let apuestaEfectuada = 10;

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.startsWith('csrftoken=')) {
                        cookieValue = cookie.substring(10);
                        break;
                    }
                }
            }
            return cookieValue;
        }

        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                saldoActual = parseFloat(data.creditos);
                document.getElementById('wallet-display').innerText = `BILLETERA: $${saldoActual.toFixed(2)}`;
            });

        const contenedorGrid = document.getElementById('tableroMines');
        for (let i = 0; i < 25; i++) {
            let celda = document.createElement('div');
            celda.classList.add('celda');
            celda.dataset.indice = i;
            celda.onclick = () => procesarClicCelda(i);
            contenedorGrid.appendChild(celda);
        }

        function cambiarCantidadMinas(amount, boton) {
            if (estaJugando) return; 
            minasConfiguradas = amount;
            document.querySelectorAll('.btn-mina-opcion').forEach(b => b.classList.remove('active'));
            boton.classList.add('active');
        }

        function limpiarTableroVisual() {
            document.querySelectorAll('.celda').forEach(c => {
                c.className = 'celda';
                c.innerHTML = '';
                c.style.backgroundColor = '';
                c.style.border = '';
            });
        }

        function manejarFlujoBuscaminas() {
            if (!estaJugando) {
                let inputApuesta = parseInt(document.getElementById('apuestaInput').value);
                if (isNaN(inputApuesta) || inputApuesta < 10) return;

                apuestaEfectuada = inputApuesta;
                document.getElementById('apuestaInput').disabled = true;

                fetch('/api/buscaminas/iniciar/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ apuesta: apuestaEfectuada, minas: minasConfiguradas })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.error) {
                        alert(data.error);
                        document.getElementById('apuestaInput').disabled = false;
                        return;
                    }
                    
                    limpiarTableroVisual();
                    estaJugando = true;
                    aciertosActuales = 0;
                    
                    saldoActual = parseFloat(data.nuevo_saldo);
                    document.getElementById('wallet-display').innerText = `BILLETERA: $${saldoActual.toFixed(2)}`;
                    document.getElementById('mult-display').innerText = "MULT: 1.00x";
                    document.getElementById('status-message').innerText = ">> TABLERO ENCRIPTADO. ENCUENTRA LOS PANDAS.";
                    document.getElementById('status-message').style.color = "#00ff87";
                    
                    let btn = document.getElementById('btnPrincipal');
                    btn.innerText = "Asegurar Retiro (Cash Out)";
                    btn.className = "btn-action btn-cashout";
                });
            } else {
                ejecutarCashOut();
            }
        }

        function procesarClicCelda(idx) {
            if (!estaJugando) return;
            
            let celdaVisual = document.querySelector(`[data-indice='${idx}']`);
            if (celdaVisual.classList.contains('revelada')) return;

            fetch('/api/buscaminas/verificar/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ indice: idx })
            })
            .then(res => res.json())
            .then(data => {
                if (data.resultado === 'BOMBA') {
                    celdaVisual.classList.add('bomba-explotada');
                    celdaVisual.innerHTML = '<img class="img-asset" src="/static/imagenes/bomba.png">';
                    celdaVisual.style.borderColor = '#ff0055';
                    document.getElementById('status-message').innerText = `>> ¡BUM! DETECTADO NODO ENCRIPTADO. PERDISTE $${apuestaEfectuada}.00.`;
                    document.getElementById('status-message').style.color = "#ff0055";
                    
                    revelarMatrizCompletaBackend(data.tablero_completo, idx);
                    finalizarCicloUI();
                } else if (data.resultado === 'PANDA') {
                    celdaVisual.classList.add('revelada');
                    celdaVisual.innerHTML = '<img class="img-asset" src="/static/imagenes/panda.png">';
                    celdaVisual.style.borderColor = '#00ff87';
                    
                    aciertosActuales = data.aciertos;
                    
                    document.getElementById('mult-display').innerText = `MULT: ${data.mult.toFixed(2)}x`;
                    document.getElementById('btnPrincipal').innerText = `RETIRAR: $${data.ganancia_estimada}.00`;
                } else if (data.resultado === 'COMPLETADO') {
                    celdaVisual.classList.add('revelada');
                    celdaVisual.innerHTML = '<img class="img-asset" src="/static/imagenes/panda.png">';
                    celdaVisual.style.borderColor = '#00ff87';
                    saldoActual = parseFloat(data.nuevo_saldo);
                    document.getElementById('status-message').innerText = `>> ¡BRUTAL! LIMPIASTE EL TABLERO COMPLETO: +$${data.ganancia}.00`;
                    document.getElementById('status-message').style.color = "#00ff87";
                    
                    revelarMatrizCompletaBackend(data.tablero_completo, idx);
                    finalizarCicloUI();
                }
            });
        }

        function ejecutarCashOut() {
            if (aciertosActuales === 0) {
                document.getElementById('status-message').innerText = ">> RECHAZADO: DEBES ENCONTRAR MINIMO 1 PANDA ANTES DE RETIRAR.";
                document.getElementById('status-message').style.color = "#ff0055";
                return;
            }

            fetch('/api/buscaminas/cashout/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                }
            })
            .then(res => res.json())
            .then(data => {
                saldoActual = parseFloat(data.nuevo_saldo);
                document.getElementById('status-message').innerText = `>> RETIRO EXITOSO. CRÉDITOS ASIGNADOS: +$${data.ganancia_transferida}.00`;
                document.getElementById('status-message').style.color = "#00e5ff";
                
                revelarMatrizCompletaBackend(data.tablero_completo, -1);
                finalizarCicloUI();
            });
        }

        function revelarMatrizCompletaBackend(tablero, celdaExplotadaIdx) {
            tablero.forEach((valor, i) => {
                let c = document.querySelector(`[data-indice='${i}']`);
                if (i !== celdaExplotadaIdx && !c.classList.contains('revelada')) {
                    c.classList.add('revelada');
                    if (valor === 1) {
                        c.innerHTML = '<img class="img-asset" src="/static/imagenes/bomba.png" style="filter: drop-shadow(0 0 5px #ff0055);">';
                        c.style.borderColor = 'rgba(255, 0, 85, 0.3)';
                    } else {
                        c.innerHTML = '<img class="img-asset" src="/static/imagenes/panda.png" style="opacity: 0.25;">';
                    }
                }
            });
        }

        function finalizarCicloUI() {
            estaJugando = false;
            aciertosActuales = 0;
            document.getElementById('apuestaInput').disabled = false;
            let btn = document.getElementById('btnPrincipal');
            btn.innerText = "Inicializar Hackeo";
            btn.className = "btn-action";
            document.getElementById('wallet-display').innerText = `BILLETERA: $${saldoActual.toFixed(2)}`;
        }
    </script>
</body>
</html>
