{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Cyber Rolett // Premium Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS BASE COMPATIBLES CON MÓVIL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #060b13;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #0d1524;
            padding: 15px 20px;
            border-bottom: 2px solid #00f0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: #00f0ff; letter-spacing: 1px; }
        .wallet-display { font-family: 'Orbitron', sans-serif; background: rgba(0, 240, 255, 0.05); border: 1px solid #00f0ff; padding: 6px 12px; border-radius: 8px; color: #00f0ff; font-weight: 700; font-size: 14px; }

        .game-layout {
            max-width: 1350px;
            width: 100%;
            margin: 15px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-panel {
            background: #0d1524;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            overflow-x: auto;
        }
        .history-label { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #64748b; font-weight: 700; white-space: nowrap; }
        .history-list { display: flex; gap: 8px; }
        .badge-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .badge-red { background: #ef4444; color: white; }
        .badge-black { background: #111723; color: white; border: 1px solid #475569; }
        .badge-green { background: #22c55e; color: white; }

        /* DISEÑO DE ESCRITORIO: DOS COLUMNAS */
        .main-arena {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }

        /* CONTENEDOR DE TU RULETA ORIGINAL */
        .wheel-box {
            background: radial-gradient(circle, #111a2e 0%, #060b13 100%);
            border: 1px solid #1e293b;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 400px;
        }
        
        .roulette-wrapper { 
            position: relative; 
            width: 340px; 
            height: 340px; 
        }
        
        /* Imagen original recuperada */
        .wheel-disk {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        
        /* LA BOLA FÍSICA CALIBRADA PARA QUEDAR EXACTAMENTE DEBAJO DEL NÚMERO */
        .roulette-ball {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: #ffffff;
            border-radius: 50%;
            margin-top: -7px;
            margin-left: -7px;
            z-index: 30;
            box-shadow: 0 0 8px #ffffff;
            transform-origin: 50% 50%;
            /* Radio de órbita original exacto */
            transform: rotate(0deg) translate(118px) rotate(0deg);
            transition: transform 4s cubic-bezier(0.15, 0.75, 0.2, 1);
        }
        
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 22px solid #00f0ff;
            z-index: 40;
            filter: drop-shadow(0 0 5px #00f0ff);
        }

        /* PAÑO DE APUESTAS */
        .betting-table {
            background: #092c1d;
            border: 4px solid #0b472f;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            overflow-x: auto;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 8px;
            min-width: 600px; /* Asegura que el paño no se rompa en pantallas chicas */
        }
        
        .grid-cell {
            height: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            user-select: none;
            position: relative;
        }
        
        .cell-zero { background: #22c55e; grid-row: 1 / span 3; height: auto; }
        .cell-red { background: #ef4444; color: white; }
        .cell-black { background: #111723; color: white; }
        
        .outside-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
            min-width: 600px;
        }
        .outside-cell {
            background: #111b2d;
            border: 1px solid #1e293b;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            cursor: pointer;
            border-radius: 6px;
            position: relative;
        }
        .cell-ext-red { background: #ef4444; color: white; border-color: #ef4444; }
        .cell-ext-black { background: #111723; color: white; border-color: #334155; }

        .grid-cell.selected-target, .outside-cell.selected-target {
            border: 2px solid #00f0ff !important;
            box-shadow: 0 0 12px #00f0ff;
        }
        .chip-counter {
            position: absolute;
            bottom: 2px;
            background: #facc15;
            color: #000;
            font-size: 9px;
            font-weight: 800;
            padding: 1px 3px;
            border-radius: 10px;
        }

        .bottom-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            background: #0d1524;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            gap: 10px;
        }
        
        .input-panel label { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .input-panel input {
            background: #060b13; border: 2px solid #1e293b; padding: 10px; border-radius: 8px;
            color: white; font-size: 15px; font-weight: 700; width: 100px; outline: none;
        }

        .btn-group-actions { display: flex; gap: 8px; }
        .btn-control {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }
        .btn-repeat { background: #1e293b; color: #ffffff; border: 1px solid #334155; }
        .btn-clear { background: #ef4444; color: #ffffff; }
        .btn-spin { background: #00f0ff; color: #060b13; font-size: 12px; font-weight: 900; }
        
        .btn-control:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }

        .hud-ticker {
            grid-column: 1 / -1;
            background: #090e17;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 📱 RESPONSIVO ADAPTABLE PARA MÓVIL COMPLETADO 📱 */
        @media (max-width: 900px) {
            .main-arena {
                grid-template-columns: 1fr !important; /* Fuerza a poner una sola columna */
            }
            .wheel-box {
                grid-row: 1; /* Pone la ruleta en la parte superior de la pantalla */
                height: 380px;
            }
            .betting-table {
                grid-row: 2; /* Pone el paño debajo de la ruleta */
            }
            .bottom-action-bar {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
                text-align: center;
            }
            .btn-group-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">👑 WIN CASINO // LIVE CORE</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="saldo-display" class="wallet-display">CRÉDITOS: $0.00</div>
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600;">Lobby</a>
        </div>
    </header>

    <div class="game-layout">
        <div class="history-panel">
            <div class="history-label">ÚLTIMOS NÚMEROS</div>
            <div id="historial-lista" class="history-list"></div>
        </div>

        <div class="main-arena">
            <div class="wheel-box">
                <div class="roulette-wrapper">
                    <div class="wheel-pointer"></div>
                    <div id="ruleta-disco" class="wheel-disk" style="background-image: url('{% static 'imagenes/ruleta_disco.png' %}');"></div>
                    <div id="ruleta-bolita" class="roulette-ball"></div>
                </div>
            </div>

            <div class="betting-table">
                <div class="numbers-grid">
                    <div class="grid-cell cell-zero" data-num="0" onclick="elegirCelda('0', 'verde', this)"><span>0</span></div>
                    <div class="grid-cell cell-red" data-num="1" onclick="elegirCelda('1', 'rojo', this)"><span>1</span></div>
                    <div class="grid-cell cell-black" data-num="2" onclick="elegirCelda('2', 'negro', this)"><span>2</span></div>
                    <div class="grid-cell cell-red" data-num="3" onclick="elegirCelda('3', 'rojo', this)"><span>3</span></div>
                    <div class="grid-cell cell-black" data-num="4" onclick="elegirCelda('4', 'negro', this)"><span>4</span></div>
                    <div class="grid-cell cell-red" data-num="5" onclick="elegirCelda('5', 'rojo', this)"><span>5</span></div>
                    <div class="grid-cell cell-black" data-num="6" onclick="elegirCelda('6', 'negro', this)"><span>6</span></div>
                    <div class="grid-cell cell-red" data-num="7" onclick="elegirCelda('7', 'rojo', this)"><span>7</span></div>
                    <div class="grid-cell cell-black" data-num="8" onclick="elegirCelda('8', 'negro', this)"><span>8</span></div>
                    <div class="grid-cell cell-red" data-num="9" onclick="elegirCelda('9', 'rojo', this)"><span>9</span></div>
                    <div class="grid-cell cell-black" data-num="10" onclick="elegirCelda('10', 'negro', this)"><span>10</span></div>
                    <div class="grid-cell cell-black" data-num="11" onclick="elegirCelda('11', 'negro', this)"><span>11</span></div>
                    <div class="grid-cell cell-red" data-num="12" onclick="elegirCelda('12', 'rojo', this)"><span>12</span></div>
                    <div class="grid-cell cell-black" data-num="13" onclick="elegirCelda('13', 'negro', this)"><span>13</span></div>
                    <div class="grid-cell cell-red" data-num="14" onclick="elegirCelda('14', 'rojo', this)"><span>14</span></div>
                    <div class="grid-cell cell-black" data-num="15" onclick="elegirCelda('15', 'negro', this)"><span>15</span></div>
                    <div class="grid-cell cell-red" data-num="16" onclick="elegirCelda('16', 'rojo', this)"><span>16</span></div>
                    <div class="grid-cell cell-black" data-num="17" onclick="elegirCelda('17', 'negro', this)"><span>17</span></div>
                    <div class="grid-cell cell-red" data-num="18" onclick="elegirCelda('18', 'rojo', this)"><span>18</span></div>
                    <div class="grid-cell cell-red" data-num="19" onclick="elegirCelda('19', 'rojo', this)"><span>19</span></div>
                    <div class="grid-cell cell-black" data-num="20" onclick="elegirCelda('20', 'negro', this)"><span>20</span></div>
                    <div class="grid-cell cell-red" data-num="21" onclick="elegirCelda('21', 'rojo', this)"><span>21</span></div>
                    <div class="grid-cell cell-black" data-num="22" onclick="elegirCelda('22', 'negro', this)"><span>22</span></div>
                    <div class="grid-cell cell-red" data-num="23" onclick="elegirCelda('23', 'rojo', this)"><span>23</span></div>
                    <div class="grid-cell cell-black" data-num="24" onclick="elegirCelda('24', 'negro', this)"><span>24</span></div>
                    <div class="grid-cell cell-red" data-num="25" onclick="elegirCelda('25', 'rojo', this)"><span>25</span></div>
                    <div class="grid-cell cell-black" data-num="26" onclick="elegirCelda('26', 'negro', this)"><span>26</span></div>
                    <div class="grid-cell cell-red" data-num="27" onclick="elegirCelda('27', 'rojo', this)"><span>27</span></div>
                    <div class="grid-cell cell-black" data-num="28" onclick="elegirCelda('28', 'negro', this)"><span>28</span></div>
                    <div class="grid-cell cell-black" data-num="29" onclick="elegirCelda('29', 'negro', this)"><span>29</span></div>
                    <div class="grid-cell cell-red" data-num="30" onclick="elegirCelda('30', 'rojo', this)"><span>30</span></div>
                    <div class="grid-cell cell-black" data-num="31" onclick="elegirCelda('31', 'negro', this)"><span>31</span></div>
                    <div class="grid-cell cell-red" data-num="32" onclick="elegirCelda('32', 'rojo', this)"><span>32</span></div>
                    <div class="grid-cell cell-black" data-num="33" onclick="elegirCelda('33', 'negro', this)"><span>33</span></div>
                    <div class="grid-cell cell-red" data-num="34" onclick="elegirCelda('34', 'rojo', this)"><span>34</span></div>
                    <div class="grid-cell cell-black" data-num="35" onclick="elegirCelda('35', 'negro', this)"><span>35</span></div>
                    <div class="grid-cell cell-red" data-num="36" onclick="elegirCelda('36', 'rojo', this)"><span>36</span></div>
                </div>

                <div class="outside-section">
                    <div class="outside-cell" data-num="PAR" onclick="elegirCelda('PAR', 'externa', this)">PAR</div>
                    <div class="outside-cell cell-ext-red" data-num="ROJO" onclick="elegirCelda('ROJO', 'externa', this)">ROJO</div>
                    <div class="outside-cell cell-ext-black" data-num="NEGRO" onclick="elegirCelda('NEGRO', 'externa', this)">NEGRO</div>
                    <div class="outside-cell" data-num="IMPAR" onclick="elegirCelda('IMPAR', 'externa', this)">IMPAR</div>
                </div>

                <div class="bottom-action-bar">
                    <div class="input-panel">
                        <label style="display:block; margin-bottom:5px;">Ficha ($)</label>
                        <input type="number" id="montoApuesta" value="20" min="5">
                    </div>
                    <div class="btn-group-actions">
                        <button id="btnRepetir" class="btn-control btn-repeat" onclick="repetirUltimaApuesta()">↩️ Repetir</button>
                        <button id="btnLimpiar" class="btn-control btn-clear" onclick="limpiarMesa()">Limpiar</button>
                        <button id="btnGirar" class="btn-control btn-spin" onclick="lanzarBolaRuleta()">Girar Ruleta</button>
                    </div>
                </div>
            </div>

            <div id="texto-resultado" class="hud-ticker">
                SISTEMA OPERATIVO // HAZ TUS APUESTAS
            </div>
        </div>
    </div>

    <script>
        let apuestasActuales = {}; 
        let ultimaApuestaGuardada = null;  
        let saldoActual = 0;
        let gradosDiscoAcumulados = 0;

        // Mapeo físico exacto de tu cilindro gráfico
        const mapaFisicoRuleta = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];

        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                saldoActual = data.creditos;
                actualizarPantallaSaldo();
            });

        function actualizarPantallaSaldo() {
            document.getElementById('saldo-display').innerText = `CRÉDITOS: $${saldoActual.toFixed(2)}`;
        }

        function elegirCelda(clave, tipo, elemento) {
            let valorFicha = parseFloat(document.getElementById('montoApuesta').value) || 20;
            if (saldoActual < valorFicha) { alert("Créditos insuficientes."); return; }

            if (!apuestasActuales[clave]) { apuestasActuales[clave] = 0; }
            apuestasActuales[clave] += valorFicha;
            saldoActual -= valorFicha; 
            actualizarPantallaSaldo();

            elemento.classList.add('selected-target');
            let chip = elemento.querySelector('.chip-counter');
            if (chip) chip.remove();
            
            let contador = document.createElement('div');
            contador.className = 'chip-counter';
            contador.innerText = `$${apuestasActuales[clave]}`;
            elemento.appendChild(contador);
        }

        // FÍSICA CALIBRADA INDEPENDIENTE PARA TU IMAGEN DE MADERA
        function lanzarBolaRuleta() {
            if (Object.keys(apuestasActuales).length === 0) { alert("Coloca una ficha."); return; }

            document.getElementById('btnGirar').disabled = true;
            document.getElementById('btnRepetir').disabled = true;
            document.getElementById('btnLimpiar').disabled = true;
            document.getElementById('texto-resultado').innerText = "🌀 EL CILINDRO ESTÁ EN MOVIMIENTO...";

            let clavesApostadas = Object.keys(apuestasActuales);
            let numEnvio = isNaN(clavesApostadas[0]) ? 1 : parseInt(clavesApostadas[0]); 
            let montoEnvio = apuestasActuales[clavesApostadas[0]];

            fetch('/api/ruleta/girar/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numero: numEnvio, apuesta: montoEnvio, apuestas_multiples: apuestasActuales })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) { alert(data.error); resetBotones(); return; }

                ultimaApuestaGuardada = JSON.parse(JSON.stringify(apuestasActuales));
                let numGanador = data.numero_ganador; 
                
                let indiceFisico = mapaFisicoRuleta.indexOf(numGanador);
                let gradosDelSector = (360 / 37) * indiceFisico;

                gradosDiscoAcumulados += 1440; // 4 vueltas completas
                
                // CALIBRACIÓN DE CAÍDA EXACTA BAJO EL NÚMERO
                // El disco gira a favor, la bola rota en reversa acumulada restando el sector y los 5 grados de desfase originales.
                let gradosFinalesBola = (gradosDiscoAcumulados * -1) - gradosDelSector - 5; 

                document.getElementById('ruleta-disco').style.transform = `rotate(${gradosDiscoAcumulados}deg)`;
                document.getElementById('ruleta-bolita').style.transform = `rotate(${gradosFinalesBola}deg) translate(118px)`;

                setTimeout(() => {
                    let colorGanador = data.color.toLowerCase();
                    let colorEstilo = colorGanador === 'rojo' ? '#ef4444' : (colorGanador === 'negro' ? '#94a3b8' : '#22c55e');
                    
                    document.getElementById('texto-resultado').innerHTML = `CAYÓ EL NÚMERO <span style="color: ${colorEstilo}; font-weight:900;">${numGanador}</span> (${colorGanador.toUpperCase()}). Pagado Total: $${data.premio_total}`;
                    
                    saldoActual = data.nuevo_saldo;
                    actualizarPantallaSaldo();

                    let cssBadge = colorGanador === 'rojo' ? 'badge-red' : (colorGanador === 'negro' ? 'badge-black' : 'badge-green');
                    let histContenedor = document.getElementById('historial-lista');
                    histContenedor.innerHTML = `<div class="badge-num ${cssBadge}">${numGanador}</div>` + histContenedor.innerHTML;

                    limpiarMesaSinDevolver();
                    resetBotones();
                }, 4000);
            });
        }

        function repetirUltimaApuesta() {
            if (!ultimaApuestaGuardada || Object.keys(ultimaApuestaGuardada).length === 0) { alert("No hay apuestas previas."); return; }
            let totalRequerido = Object.values(ultimaApuestaGuardada).reduce((a, b) => a + b, 0);
            if (saldoActual < totalRequerido) { alert("Saldo insuficiente."); return; }

            limpiarMesaSinDevolver();
            apuestasActuales = JSON.parse(JSON.stringify(ultimaApuestaGuardada));
            saldoActual -= totalRequerido;
            actualizarPantallaSaldo();

            for (let clave in apuestasActuales) {
                let celdaHtml = document.querySelector(`[data-num="${clave}"]`);
                if (celdaHtml) {
                    celdaHtml.classList.add('selected-target');
                    let contador = document.createElement('div');
                    contador.className = 'chip-counter';
                    contador.innerText = `$${apuestasActuales[clave]}`;
                    celdaHtml.appendChild(contador);
                }
            }
        }

        function limpiarMesa() {
            let totalDevolver = Object.values(apuestasActuales).reduce((a, b) => a + b, 0);
            saldoActual += totalDevolver;
            actualizarPantallaSaldo();
            limpiarMesaSinDevolver();
        }

        function limpiarMesaSinDevolver() {
            apuestasActuales = {};
            document.querySelectorAll('.grid-cell, .outside-cell').forEach(c => {
                c.classList.remove('selected-target');
                let chip = c.querySelector('.chip-counter');
                if (chip) chip.remove();
            });
        }

        function resetBotones() {
            document.getElementById('btnGirar').disabled = false;
            document.getElementById('btnRepetir').disabled = false;
            document.getElementById('btnLimpiar').disabled = false;
        }
    </script>
</body>
</html>
