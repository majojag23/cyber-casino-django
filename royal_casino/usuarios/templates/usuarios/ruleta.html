{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Rolett // Premium Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS PREMIUM CYBER CASINO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050a12;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, #0b1528 0%, #050a12 100%);
            padding: 20px 40px;
            border-bottom: 2px solid #00f0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #00f0ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .saldo-box {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid #00f0ff;
            padding: 10px 20px;
            border-radius: 8px;
            color: #00f0ff;
            font-weight: 700;
        }
        .btn-menu {
            color: #94a3b8;
            text-decoration: none;
            background: #111b2d;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #1e293b;
            transition: all 0.2s;
        }
        .btn-menu:hover { color: #fff; background: #1e293b; }

        /* PANEL PRINCIPAL */
        .game-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            margin: 30px auto;
            padding: 0 25px;
            flex: 1;
        }

        /* HISTORIAL SUPERIOR */
        .history-bar {
            grid-column: 1 / -1;
            background: #0b1528;
            border: 1px solid #1e293b;
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .history-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 1px;
        }
        .history-numbers { display: flex; gap: 8px; flex-wrap: wrap; }
        .num-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }
        .badge-rojo { background: #ef4444; color: white; }
        .badge-negro { background: #1e293b; color: white; border: 1px solid #475569; }
        .badge-verde { background: #22c55e; color: white; box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }

        /* PANEL DE APUESTAS */
        .control-panel {
            background: #0b1528;
            border-radius: 16px;
            border: 1px solid #1e293b;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 700;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .input-group input {
            background: #050a12;
            border: 2px solid #1e293b;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            outline: none;
        }
        .input-group input:focus { border-color: #00f0ff; }

        /* BOTONES DE COLOR */
        .color-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-color {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid transparent;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-rojo { background: #ef4444; color: white; }
        .btn-rojo:hover { background: #dc2626; }
        .btn-negro { background: #111b2d; color: white; border: 2px solid #1e293b; }
        .btn-negro:hover { background: #1e293b; }
        .btn-color.active-rojo { border-color: #ffffff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .btn-color.active-negro { border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }

        .btn-action {
            background: #00f0ff;
            color: #050a12;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 900;
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-action:hover:not(:disabled) { background: #38bdf8; transform: translateY(-2px); }
        .btn-action:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }

        /* PANTALLA VISUAL DE LA RULETA */
        .roulette-screen {
            background: radial-gradient(circle at center, #0f1c30 0%, #050a12 100%);
            border-radius: 20px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px;
        }

        .roulette-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            margin-bottom: 30px;
        }
        .wheel-disk {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        /* Marcador superior central fijo */
        .wheel-marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #00f0ff;
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(0, 240, 255, 0.6));
        }

        .result-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid #1e293b;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚡ CYBER ROLETT // LIVE CORE</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="saldo-display" class="saldo-box">CRÉDITOS: $0.00</div>
            <a href="/" class="btn-menu">Volver al Menú</a>
        </div>
    </header>

    <div class="game-container">
        
        <div class="history-bar">
            <div class="history-title">ÚLTIMOS RESULTADOS</div>
            <div id="historial-numeros" class="history-numbers">
                </div>
        </div>

        <div class="control-panel">
            <div class="section-title">CONFIGURAR APUESTA</div>
            
            <div class="input-group">
                <label>Monto a Apostar ($)</label>
                <input type="number" id="montoApuesta" value="20" min="1">
            </div>

            <div class="input-group">
                <label>Selecciona Color</label>
                <div class="color-selector">
                    <button id="btnRojo" class="btn-color btn-rojo" onclick="seleccionarColor('ROJO')">Rojo</button>
                    <button id="btnNegro" class="btn-color btn-negro" onclick="seleccionarColor('NEGRO')">Negro</button>
                </div>
            </div>

            <button id="btnGirar" class="btn-action" onclick="jugarRuleta()">Girar Ruleta</button>
        </div>

        <div class="roulette-screen">
            <div class="roulette-wrapper">
                <div class="wheel-marker"></div>
                <div id="disco" class="wheel-disk" style="background-image: url('{% static 'imagenes/ruleta_disco.png' %}');"></div>
            </div>

            <div id="texto-resultado" class="result-box">
                SISTEMA LISTO // SELECCIONA TU COLOR Y GIRA
            </div>
        </div>

    </div>

    <script>
        let colorSeleccionado = '';
        let saldoActual = 0;
        let gradosActuales = 0;

        // Cargar saldo al entrar
        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                saldoActual = data.creditos;
                document.getElementById('saldo-display').innerText = `CRÉDITOS: $${saldoActual.toFixed(2)}`;
            });

        function seleccionarColor(color) {
            colorSeleccionado = color;
            document.getElementById('btnRojo').classList.remove('active-rojo');
            document.getElementById('btnNegro').classList.remove('active-negro');

            if (color === 'ROJO') {
                document.getElementById('btnRojo').classList.add('active-rojo');
            } else {
                document.getElementById('btnNegro').classList.add('active-negro');
            }
        }

        function jugarRuleta() {
            let monto = parseFloat(document.getElementById('montoApuesta').value);
            
            if (!colorSeleccionado) {
                alert("Por favor, selecciona un color (Rojo o Negro) antes de girar.");
                return;
            }
            if (isNaN(monto) || monto <= 0) {
                alert("Ingresa un monto de apuesta válido.");
                return;
            }

            document.getElementById('btnGirar').disabled = true;
            document.getElementById('texto-resultado').innerText = "🌀 GIRANDO LA RUEDA...";

            fetch('/api/ruleta/girar/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ color: colorSeleccionado, apuesta: monto })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    document.getElementById('btnGirar').disabled = false;
                    document.getElementById('texto-resultado').innerText = "SISTEMA LISTO";
                    return;
                }

                // ANIMACIÓN DE GIRO FÍSICO
                // Sumamos 5 vueltas completas (1800 grados) más una variación aleatoria para el efecto visual
                gradosActuales += 1800 + Math.floor(Math.random() * 360);
                document.getElementById('disco').style.transform = `rotate(${gradosActuales}deg)`;

                // Esperamos los 4 segundos que dura la transición CSS para mostrar la verdad
                setTimeout(() => {
                    // AQUÍ ESTÁ EL CAMBIO CRUCIAL: 'data.numero_ganador' mapeado exactamente como el backend
                    let numGanador = data.numero_ganador; 
                    let colorGanador = data.color.toUpperCase();
                    
                    // Armamos el mensaje final
                    let colorTxt = colorGanador === 'ROJO' ? '<span style="color: #ef4444;">ROJO</span>' : '<span style="color: #94a3b8;">NEGRO</span>';
                    document.getElementById('texto-resultado').innerHTML = `CAYÓ EL NUMERO <strong>${numGanador}</strong> (${colorTxt}). Total Apostado: $${data.total_apostado} | Ganado: $${data.premio_total}`;
                    
                    // Actualizamos créditos de la billetera
                    saldoActual = data.nuevo_saldo;
                    document.getElementById('saldo-display').innerText = `CRÉDITOS: $${saldoActual.toFixed(2)}`;

                    // Agregamos al historial dinámico lateral
                    let claseBadge = colorGanador === 'ROJO' ? 'badge-rojo' : 'badge-negro';
                    let historial = document.getElementById('historial-numeros');
                    historial.innerHTML = `<div class="num-badge ${claseBadge}">${numGanador}</div>` + historial.innerHTML;

                    // Habilitar botón de nuevo
                    document.getElementById('btnGirar').disabled = false;
                }, 4000);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('btnGirar').disabled = false;
                document.getElementById('texto-resultado').innerText = "ERROR EN CONEXIÓN CON EL SERVIDOR";
            });
        }
    </script>
</body>
</html>
