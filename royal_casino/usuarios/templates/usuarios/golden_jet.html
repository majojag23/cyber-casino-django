{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Jet // Win Casino Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS DE LUJO ESTILO WIN CASINO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b121f;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #121c2e;
            padding: 15px 40px;
            border-bottom: 2px solid #facc15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .brand { font-size: 20px; font-weight: 800; color: #facc15; letter-spacing: 1px; }
        .btn-volver {
            color: #ffffff;
            text-decoration: none;
            background: #1c2b45;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #2a3d5c;
        }

        /* DISEÑO DE PANELES */
        .main-game {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            gap: 20px;
            padding: 25px;
        }

        /* PANEL DE APUESTA */
        .bet-card {
            background: #121c2e;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #1c2b45;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .input-box label { display: block; font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        .input-box input {
            width: 100%;
            background: #0b121f;
            border: 2px solid #2a3d5c;
            padding: 15px;
            border-radius: 10px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            outline: none;
        }
        .input-box input:focus { border-color: #facc15; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-apostar { background: #facc15; color: #0b121f; }
        .btn-apostar:hover { background: #fde047; transform: translateY(-2px); }
        .btn-cobrar { background: #22c55e; color: #ffffff; display: none; }
        .btn-cobrar:hover { background: #4ade80; }

        /* PANTALLA DE VUELO */
        .flight-screen {
            background: radial-gradient(circle at center, #1e293b 0%, #0b121f 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid #1c2b45;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* EL PILOTO Y EL JET */
        .jet-pilot-container {
            position: absolute;
            bottom: 10%;
            left: 10%;
            width: 220px;
            z-index: 50;
            display: none; /* Se activa al jugar */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        .jet-pilot-container img {
            width: 100%;
            height: auto;
        }

        /* TEXTO DEL MULTIPLICADOR */
        .multiplier-val {
            font-size: 110px;
            font-weight: 800;
            color: #ffffff;
            z-index: 60;
            text-shadow: 0 5px 25px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* INDICADORES */
        .hud-status {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #2a3d5c;
        }
        .hud-balance {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #4ade80;
            font-weight: 800;
            font-size: 18px;
        }

        /* ANIMACIÓN DE HUMO/ESTELA */
        .exhaust-trail {
            position: absolute;
            bottom: 10%;
            left: 10%;
            height: 4px;
            background: linear-gradient(to right, transparent, #facc15);
            transform-origin: left center;
            z-index: 40;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">👑 WIN CASINO // GOLDEN JET</div>
        <a href="/" class="btn-volver">Ir al Lobby</a>
    </header>

    <div class="main-game">
        <div class="bet-card">
            <div style="font-size: 13px; font-weight: 800; color: #94a3b8;">CABINA DE MANDO</div>
            
            <div class="input-box">
                <label>Tu Apuesta ($ USD)</label>
                <input type="number" id="montoApuesta" value="20" min="5">
            </div>

            <button id="btnPlay" class="btn-main btn-apostar" onclick="despegarJet()">Iniciar Despegue</button>
            <button id="btnCash" class="btn-main btn-cobrar" onclick="cobrarGanancia()">Cobrar: $0.00</button>

            <div id="log-msg" style="font-size: 12px; color: #64748b; line-height: 1.6; text-align: center;">
                Ajusta tu apuesta y prepárate para el vuelo del Golden Jet.
            </div>
        </div>

        <div class="flight-screen">
            <div id="wallet" class="hud-balance">CARGANDO SALDO...</div>
            <div id="status" class="hud-status">LISTO PARA EL VUELO</div>
            
            <div id="multiplier" class="multiplier-val">1.00x</div>

            <div id="pilot-jet" class="jet-pilot-container">
                <img src="{% static 'imagenes/jet.png' %}" alt="Piloto Golden Jet">
            </div>

            <div id="trail" class="exhaust-trail"></div>
        </div>
    </div>

    <script>
        let saldoActual = 0;
        let estaVolando = false;
        let multiplicador = 1.00;
        let bucleGrafico;
        let apuestaEfectuada = 0;

        // Cargar saldo inicial
        fetch('/api/saldo/')
            .then(r => r.json())
            .then(d => {
                saldoActual = d.creditos;
                document.getElementById('wallet').innerText = `$${saldoActual.toFixed(2)}`;
            });

        function despegarJet() {
            let monto = parseFloat(document.getElementById('montoApuesta').value);
            if (isNaN(monto) || monto < 1) return;

            document.getElementById('btnPlay').disabled = true;

            fetch('/api/golden-jet/accion/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ accion: 'APOSTAR', apuesta: monto })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    document.getElementById('btnPlay').disabled = false;
                    return;
                }

                apuestaEfectuada = monto;
                saldoActual = data.nuevo_saldo;
                actualizarInterfazVuelo();
                
                estaVolando = true;
                let inicio = performance.now();

                bucleGrafico = setInterval(() => {
                    let tiempo = (performance.now() - inicio) / 1000;
                    // Fórmula exponencial de crecimiento
                    multiplicador = parseFloat((1.00 + Math.pow(tiempo, 1.4) * 0.45).toFixed(2));
                    
                    document.getElementById('multiplier').innerText = `${multiplicador.toFixed(2)}x`;
                    document.getElementById('btnCash').innerText = `Cobrar: $${(apuestaEfectuada * multiplicador).toFixed(2)}`;

                    // MOVER AL PILOTO HACIA ARRIBA Y A LA DERECHA
                    let movX = Math.min(10 + (tiempo * 5), 65);
                    let movY = Math.min(10 + (tiempo * 4), 60);
                    let jet = document.getElementById('pilot-jet');
                    jet.style.left = `${movX}%`;
                    jet.style.bottom = `${movY}%`;
                    
                }, 80);
            });
        }

        function actualizarInterfazVuelo() {
            document.getElementById('pilot-jet').style.display = "block";
            document.getElementById('pilot-jet').style.left = "10%";
            document.getElementById('pilot-jet').style.bottom = "10%";
            document.getElementById('btnPlay').style.display = "none";
            document.getElementById('btnCash').style.display = "block";
            document.getElementById('multiplier').style.color = "#ffffff";
            document.getElementById('wallet').innerText = `$${saldoActual.toFixed(2)}`;
            document.getElementById('status').innerText = "VUELO EN CURSO";
        }

        function cobrarGanancia() {
            if (!estaVolando) return;
            clearInterval(bucleGrafico);
            estaVolando = false;

            fetch('/api/golden-jet/accion/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ accion: 'COBRAR', multiplicador: multiplicador })
            })
            .then(r => r.json())
            .then(data => {
                saldoActual = data.nuevo_saldo;
                if (data.busted) {
                    document.getElementById('multiplier').innerText = "EXPLOTÓ";
                    document.getElementById('multiplier').style.color = "#ef4444";
                    document.getElementById('pilot-jet').style.display = "none";
                    document.getElementById('status').innerText = "JET PERDIDO";
                } else {
                    document.getElementById('status').innerText = `¡GANASTE $${data.ganancia}!`;
                }
                resetearBotones();
            });
        }

        function resetearBotones() {
            document.getElementById('btnPlay').style.display = "block";
            document.getElementById('btnPlay').disabled = false;
            document.getElementById('btnCash').style.display = "none";
            document.getElementById('wallet').innerText = `$${saldoActual.toFixed(2)}`;
        }
    </script>
</body>
</html>
