{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Royal Casino Core - Neon Slots</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #060211 url('{% static "imagenes/slots_bg.webp" %}') no-repeat center top/cover;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 90px;
        }

        /* --- BOTÓN VOLVER & ENCABEZADO --- */
        .game-header {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
        }
        .btn-back {
            position: absolute; left: 15px; top: 15px;
            background: rgba(0, 191, 255, 0.15); border: 1px solid #00bfff;
            color: #00bfff; font-family: 'Orbitron', sans-serif; font-size: 11px;
            font-weight: 700; padding: 6px 12px; border-radius: 6px;
            text-decoration: none; display: flex; align-items: center; gap: 4px;
        }
        
        .game-title {
            font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900;
            text-align: center; margin-top: 25px; letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.6);
        }
        .game-title span { color: #ec4899; }

        /* --- MARCADORES (BILLETERA Y APUESTA) --- */
        .scoreboard {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 440px; margin: 10px auto; padding: 0 16px;
        }
        .hud-box {
            background: rgba(13, 10, 31, 0.8);
            border: 1px solid #a855f7; box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.3);
            border-radius: 10px; padding: 8px 14px; width: 46%;
            font-family: 'Orbitron', sans-serif;
        }
        .hud-label { font-size: 10px; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; }
        .hud-value { font-size: 15px; font-weight: 900; margin-top: 2px; }
        .val-wallet { color: #00ea97; }
        .val-bet { color: #eab308; }

        /* --- CONTENEDOR CENTRAL DE LOGO Y REELS --- */
        .slots-stage {
            width: 100%; max-width: 420px; margin: 0 auto;
            position: relative; display: flex; flex-direction: column; align-items: center;
        }

        /* La Conejita dealer flotando sobre el juego */
        .bunny-layer {
            width: 180px; height: auto; z-index: 2;
            margin-bottom: -35px; /* Superposición exacta sobre el marco */
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
        }

        /* El marco contenedor de los rodillos */
        .machine-frame {
            background: rgba(15, 10, 36, 0.9) url('{% static "imagenes/slot_frame.webp" %}') no-repeat center/cover;
            border-radius: 24px; padding: 12px;
            width: calc(100% - 24px); display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; box-shadow: 0 0 30px rgba(168, 85, 247, 0.25);
            position: relative; z-index: 5;
        }

        /* Estilo de cada rodillo */
        .reel-column {
            background: #090518; border: 2px solid rgba(168, 85, 247, 0.4);
            border-radius: 16px; height: 230px; overflow: hidden;
            position: relative; display: flex; flex-direction: column; justify-content: space-around;
            align-items: center;
        }
        .symbol-slot {
            font-size: 42px; height: 70px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease-in-out;
        }

        /* --- BOTÓN SPIN NOW --- */
        .action-area {
            width: 100%; max-width: 440px; margin: 20px auto 10px auto;
            padding: 0 16px; text-align: center; position: relative;
        }
        .btn-spin {
            width: 100%;
            background: linear-gradient(180deg, #8b5cf6 0%, #6d28d9 100%);
            border: 2px solid #c084fc; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            border-radius: 50px; padding: 16px;
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900;
            color: #ffffff; cursor: pointer; letter-spacing: 1px;
            transition: transform 0.1s;
        }
        .btn-spin:active { transform: scale(0.97); }
        .btn-spin:disabled { background: #4b5563; border-color: #6b7280; cursor: not-allowed; box-shadow: none; }

        /* Elemento Decorativo: Fichas en la esquina */
        .decor-chips {
            position: absolute; right: 10px; bottom: -15px;
            width: 75px; height: auto; pointer-events: none; z-index: 10;
        }

        /* --- NAVBAR INFERIOR DE CRISTAL --- */
        .bottom-navbar-dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 30px); max-width: 440px; z-index: 100;
        }
        .bottom-blur-capsule {
            background: rgba(15, 10, 36, 0.9); border: 1px solid rgba(168, 85, 247, 0.35);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 32px; height: 64px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        .dock-tab-link {
            text-align: center; color: #64748b; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .dock-tab-link.active { color: #ff007f; }
        .tab-icon-img { font-size: 18px; }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <header class="game-header">
        <a href="/lobby/" class="btn-back">❮ Volver al lobby</a>
        <h1 class="game-title">👑 NEON <span>SLOTS</span> 👑</h1>
    </header>

    <!-- Marcadores de Estado -->
    <section class="scoreboard">
        <div class="hud-box">
            <p class="hud-label">💳 BILLETERA</p>
            <p class="hud-value val-wallet">$<span id="lbl-saldo">50.00</span></p>
        </div>
        <div class="hud-box">
            <p class="hud-label">🎰 APUESTA</p>
            <p class="hud-value val-bet">$<span id="lbl-apuesta">20.00</span></p>
        </div>
    </section>

    <!-- Zona Central de la Máquina -->
    <section class="slots-stage">
        <img class="bunny-layer" src='{% static "imagenes/bunny_mascot.webp" %}' alt="Mascota">
        
        <div class="machine-frame">
            <!-- Rodillo 1 -->
            <div class="reel-column" id="reel-1">
                <div class="symbol-slot">🍉</div>
                <div class="symbol-slot">🍊</div>
                <div class="symbol-slot">🍒</div>
            </div>
            <!-- Rodillo 2 -->
            <div class="reel-column" id="reel-2">
                <div class="symbol-slot">💎</div>
                <div class="symbol-slot">🍋</div>
                <div class="symbol-slot">7️⃣</div>
            </div>
            <!-- Rodillo 3 -->
            <div class="reel-column" id="reel-3">
                <div class="symbol-slot">🍒</div>
                <div class="symbol-slot">🍋</div>
                <div class="symbol-slot">🍒</div>
            </div>
        </div>
    </section>

    <!-- Área de Disparo -->
    <section class="action-area">
        <button class="btn-spin" id="btn-trigger" onclick="spinSlots()">SPIN NOW</button>
        <img class="decor-chips" src='{% static "imagenes/casino_chips.webp" %}' alt="Chips">
    </section>

    <!-- Barra Inferior de Navegación -->
    <div class="bottom-navbar-dock">
        <nav class="bottom-blur-capsule">
            <a href="/lobby/" class="dock-tab-link active"><span class="tab-icon-img">👑</span>LOBBY</a>
            <a href="/promos/" class="dock-tab-link"><span class="tab-icon-img">🎁</span>PROMOS</a>
            <a href="/vip/" class="dock-tab-link"><span class="tab-icon-img">💎</span>VIP</a>
            <a href="/perfil/" class="dock-tab-link"><span class="tab-icon-img">👤</span>PERFIL</a>
        </nav>
    </div>

    <!-- LÓGICA DE GIRO INTEGRADA -->
    <script>
        const simbolosPool = ['🍉', '🍋', '🍊', '🍒', '💎', '7️⃣'];

        function spinSlots() {
            const btn = document.getElementById('btn-trigger');
            btn.disabled = true;

            // Simulación visual rápida de giro de rodillos
            let intervalos = [];
            for (let i = 1; i <= 3; i++) {
                let reel = document.getElementById(`reel-${i}`);
                intervalos[i] = setInterval(() => {
                    reel.innerHTML = `
                        <div class="symbol-slot">${simbolosPool[Math.floor(Math.random() * simbolosPool.length)]}</div>
                        <div class="symbol-slot">${simbolosPool[Math.floor(Math.random() * simbolosPool.length)]}</div>
                        <div class="symbol-slot">${simbolosPool[Math.floor(Math.random() * simbolosPool.length)]}</div>
                    `;
                }, 80);
            }

            // Llamada simulada al backend (Conéctala con tu fetch real de apuestas de Django mañana)
            setTimeout(() => {
                clearInterval(intervalos[1]);
                setTimeout(() => {
                    clearInterval(intervalos[2]);
                    setTimeout(() => {
                        clearInterval(intervalos[3]);
                        btn.disabled = false;
                        
                        // Sincronizar saldo de manera óptima tras el juego
                        fetch('/api/saldo/')
                            .then(res => res.json())
                            .then(data => {
                                if(data && data.creditos !== undefined){
                                    document.getElementById('lbl-saldo').innerText = data.creditos.toFixed(2);
                                }
                            });
                    }, 300);
                }, 300);
            }, 1500);
        }

        // Carga inicial del saldo real del jugador
        fetch('/api/saldo/')
            .then(res => res.json())
            .then(data => {
                if(data && data.creditos !== undefined){
                    document.getElementById('lbl-saldo').innerText = data.creditos.toFixed(2);
                }
            });
    </script>
</body>
</html>
