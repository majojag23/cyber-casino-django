<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Cyber Casino</title>
    <style>
        body { background-color: #0d0e15; color: #00ffcc; font-family: 'Courier New', Courier, monospace; text-align: center; margin-top: 50px; }
        .caja-login { background-color: #1a1c29; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px #ff00ff; border: 2px solid #ff00ff; }
        input { padding: 10px; margin: 10px; border-radius: 5px; background-color: #0d0e15; color: white; border: 1px solid #00ffcc; }
        button { background-color: #ff00ff; color: white; padding: 10px 20px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 15px;}
        button:hover { background-color: #00ffcc; color: black; }
        a { color: #00ffcc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="caja-login">
        <h2>🎰 CREAR CUENTA VIP 🎰</h2>
        <form method="POST">
            {% csrf_token %}
            {{ formulario.as_p }}
            <button type="submit">Registrarme</button>
        </form>
        <p>¿Ya eres miembro? <a href="{% url 'iniciar_sesion' %}">Inicia sesión aquí</a></p>
    </div>
</body>
</html>
